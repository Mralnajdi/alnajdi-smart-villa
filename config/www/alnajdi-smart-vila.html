<html lang="en" dir="ltr">
<head>

    :root {
      --radius-xl: 30px; --radius-lg: 22px; --radius-md: 16px; --radius-sm: 12px;
      --ease: 220ms cubic-bezier(.2,.7,.2,1);
      --top-safe: env(safe-area-inset-top, 0px); --bottom-safe: env(safe-area-inset-bottom, 0px);
      --bg:#07090e; --bg2:#0d1019; --surface:#151922; --surface-2:#1b2130; --surface-3:#20283b;
      --line:rgba(255,255,255,.1); --line-strong:rgba(255,255,255,.2);
      --text:#f7f9ff; --muted:#acb8d2;
      --ok:#4ddb8f; --warn:#ffbc60; --danger:#ff5f74; --info:#4ab6ff;
      --shadow:0 25px 50px rgba(0,0,0,.45); --shadow-soft:0 10px 24px rgba(0,0,0,.25);
      --card-grad: linear-gradient(140deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
    }

    body[data-family="current"][data-mode="day"]{ --bg:#edf2fb; --bg2:#f8fbff; --surface:#fff; --surface-2:#f7faff; --surface-3:#edf2fb; --line:rgba(25,49,84,.14); --line-strong:rgba(25,49,84,.26); --text:#122037; --muted:#657798; --shadow:0 16px 36px rgba(41,75,128,.15); --shadow-soft:0 8px 20px rgba(41,75,128,.11); --card-grad:linear-gradient(150deg, rgba(40,86,160,.08), rgba(40,86,160,.02)); }
    body[data-family="current"][data-mode="night"]{ --bg:#07090e; --bg2:#0d1019; --surface:#151922; --surface-2:#1b2130; --surface-3:#20283b; --line:rgba(255,255,255,.1); --line-strong:rgba(255,255,255,.2); --text:#f7f9ff; --muted:#acb8d2; }
    body[data-family="colors"][data-mode="night"]{ --bg:#05070d; --bg2:#0b1022; --surface:#151821; --surface-2:#1c2334; --surface-3:#242f46; --line:rgba(255,255,255,.11); --line-strong:rgba(255,255,255,.24); --text:#f8f9ff; --muted:#b8c2d8; }
    body[data-family="colors"][data-mode="day"]{ --bg:#edf3ff; --bg2:#f6f9ff; --surface:#fff; --surface-2:#f8faff; --surface-3:#eef3ff; --line:rgba(44,73,119,.14); --line-strong:rgba(44,73,119,.26); --text:#14233e; --muted:#617598; --shadow:0 16px 34px rgba(45,78,130,.14); --shadow-soft:0 8px 20px rgba(45,78,130,.1); }

    body[data-family="glass"][data-mode="day"]{ --bg:#e9f4ff; --bg2:#f6fbff; --surface:linear-gradient(145deg, rgba(255,255,255,.88), rgba(255,255,255,.58)); --surface-2:linear-gradient(145deg, rgba(255,255,255,.95), rgba(255,255,255,.68)); --surface-3:rgba(255,255,255,.76); --line:rgba(74,112,165,.28); --line-strong:rgba(74,112,165,.36); --text:#13223a; --muted:#5f7496; --card-grad:linear-gradient(150deg, rgba(64,110,185,.1), rgba(64,110,185,.04)); }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{ margin:0; font-family:Inter,Tajawal,sans-serif; color:var(--text); background:
      radial-gradient(1100px 720px at -12% -24%, rgba(114,90,255,.28), transparent 55%),
      radial-gradient(900px 640px at 110% -20%, rgba(39,191,170,.22), transparent 56%),
      linear-gradient(180deg, var(--bg), var(--bg2)); transition:all .2s ease; overflow:hidden; }
    body.rtl{ font-family:Tajawal,Inter,sans-serif; }

    .msr{ font-family: "Material Symbols Rounded"; font-weight: normal; font-style: normal; font-size: 22px; display:inline-block; line-height: 1; text-transform: none; letter-spacing: normal; word-wrap: normal; white-space: nowrap; direction: ltr; font-variation-settings: 'FILL' 1; }

    .app{ height:100%; max-width:1700px; margin:0 auto; padding:calc(var(--top-safe) + 10px) 12px calc(var(--bottom-safe) + 16px); display:flex; flex-direction:column; gap:12px; overflow:auto; }
    .shell{ display:grid; grid-template-columns:minmax(0,1fr); gap:12px; }

    .topbar{ position:sticky; top:0; z-index:100; display:grid; grid-template-columns:auto 1fr auto auto; gap:8px; align-items:center; padding:8px; border-radius:var(--radius-lg); background:var(--surface-2); border:1px solid var(--line); box-shadow:var(--shadow-soft); backdrop-filter: blur(16px) saturate(130%); }
    .title{ text-align:center; font-weight:800; letter-spacing:.2em; font-size:clamp(12px,1.5vw,20px); }
    .back-btn{ width:40px;height:40px; border:1px solid var(--line); border-radius:12px; background:var(--surface-3); color:var(--text); display:inline-flex; align-items:center; justify-content:center; cursor:pointer; }
    .control-groups{ display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
    .ambient{ display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
    .ambient-chip{ display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line); border-radius:999px; padding:6px 10px; background:var(--surface-3); font-size:11px; color:var(--muted); }
    .ambient-chip .msr{ font-size:16px; color:var(--text); }
    .ambient-chip b{ color:var(--text); font-size:12px; }
    .seg{ display:flex; align-items:center; gap:4px; border:1px solid var(--line); border-radius:999px; padding:4px; background:var(--surface-3); }
    .seg button{ border:0; background:transparent; color:var(--muted); font-weight:700; font-size:11px; border-radius:999px; padding:7px 10px; cursor:pointer; }
    .seg button.active{ color:var(--text); background:rgba(255,255,255,.14); }

    .content{ display:grid; gap:12px; }
    .card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg); box-shadow:var(--shadow-soft); backdrop-filter: blur(12px) saturate(130%); }

    .hero{ display:grid; grid-template-columns:1.2fr .8fr; gap:10px; padding:16px; }
    .hero h1{ margin:0; font-size:clamp(24px,3vw,36px); }
    .hero p{ margin:8px 0 0; color:var(--muted); }
    .chips{ display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; margin-top:12px; }
    .chip{ padding:10px; border:1px solid var(--line); border-radius:12px; background:var(--card-grad); }
    .chip b{ display:block; font-size:18px; }
    .chip span{ font-size:11px; color:var(--muted); }
    .hero-side{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; }

    .icon-rail{ position:sticky; top:72px; z-index:90; display:flex; gap:10px; overflow:auto hidden; padding:2px 2px 4px; scrollbar-width:none; }
    .icon-rail::-webkit-scrollbar{ display:none; }
    .rail-item{ min-width:100px; display:grid; grid-template-columns:40px 1fr; align-items:center; gap:8px; border:1px solid var(--line); background:var(--surface-2); border-radius:14px; padding:8px 9px; cursor:pointer; }
    .rail-item.active{ border-color:var(--line-strong); box-shadow:0 0 0 1px rgba(255,255,255,.09) inset; }
    .rail-icon{ width:40px;height:40px; border-radius:13px; display:flex; align-items:center; justify-content:center; color:#fff; }
    .rail-meta{ line-height:1.15; }
    .rail-meta b{ font-size:11px; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .rail-meta span{ font-size:11px; color:var(--muted); }

    .section-title{ margin:4px 2px 8px; font-size:13px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); font-weight:700; }
    .toolbar{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
    .search{ width:min(460px,100%); border:1px solid var(--line); border-radius:12px; background:var(--surface-2); color:var(--text); padding:10px 12px; }
    .ghost-btn{ border:1px solid var(--line); background:var(--surface-2); color:var(--text); border-radius:10px; padding:8px 10px; cursor:pointer; font-weight:700; font-size:12px; }
    .grid{ display:grid; gap:10px; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); }
    .node-card{ padding:14px; min-height:110px; display:flex; flex-direction:column; justify-content:space-between; cursor:pointer; position:relative; overflow:hidden; }
    .node-card::before{ content:''; position:absolute; inset:0; background:linear-gradient(120deg, rgba(255,255,255,.12), transparent 55%); opacity:.35; pointer-events:none; }
    .node-card h3{ margin:0; font-size:17px; }
    .meta{ font-size:12px; color:var(--muted); margin-top:5px; }
    .rowmeta{ display:flex; justify-content:space-between; font-size:11px; color:var(--muted); }

    .device-section{ padding:12px; }
    .device-grid{ display:grid; gap:10px; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); }
    .device-card{ border:1px solid rgba(255,255,255,.12); border-radius:18px; background:linear-gradient(95deg, rgba(255,255,255,.06), rgba(255,255,255,.02)); position:relative; overflow:hidden; padding:0; display:grid; grid-template-columns:60px minmax(0,1fr) auto; align-items:center; min-height:88px; }
    .device-card::before{ content:''; position:absolute; inset:0; background:var(--device-grad); pointer-events:none; opacity:.95; }
    .icon-w{ position:relative; z-index:2; height:100%; display:flex; align-items:center; justify-content:center; border-inline-end:1px solid rgba(255,255,255,.12); background:radial-gradient(circle at 45% 45%, rgba(255,255,255,.18), rgba(255,255,255,.05)); }
    .icon-w .msr{ color:var(--icon-color,#fff); font-size:28px; text-shadow:0 0 18px rgba(255,255,255,.24); }
    .device-main{ position:relative; z-index:2; padding:8px 10px; min-width:0; }
    .name{ font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .state{ font-size:12px; color:rgba(255,255,255,.9); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    body[data-mode="day"] .state{ color:rgba(13,29,52,.82); }
    .tail{ position:relative; z-index:2; padding:6px; display:flex; gap:6px; align-items:center; }
    .ibtn{ border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.12); color:var(--text); border-radius:10px; min-width:32px; height:32px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; }
    .ibtn .msr{ font-size:18px; }

    .cap-row{ position:relative; z-index:2; grid-column:1/-1; border-top:1px solid rgba(255,255,255,.1); padding:8px; display:grid; gap:8px; }
    .slider-wrap{ display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:8px; }
    .slider-wrap input[type="range"]{ width:100%; accent-color:#66c7ff; }
    .slider-wrap span{ font-size:11px; color:var(--muted); }

    .badge{ display:inline-flex; align-items:center; gap:6px; border-radius:999px; border:1px solid var(--line); padding:4px 9px; font-size:11px; }
    .alert{ color:#ffd2d2; border-color:rgba(255,80,80,.5); background:rgba(255,70,70,.18); }

    .empty{ padding:24px; text-align:center; color:var(--muted); border:1px dashed var(--line-strong); border-radius:16px; }

    @media (max-width: 1100px){ .hero{ grid-template-columns:1fr; } }
    @media (max-width: 860px){ .topbar{ grid-template-columns:1fr; } .title{ order:-1; } .control-groups{ justify-content:flex-start; } .ambient{ justify-content:flex-start; } .chips{ grid-template-columns:repeat(2,minmax(0,1fr)); } .hero-side{ grid-template-columns:repeat(2,minmax(0,1fr)); } }
    @media (max-width: 720px){ .app{ padding-inline:10px; } .grid,.device-grid{ grid-template-columns:1fr; } .icon-rail{ top:118px; } }
  </style>
</head>

      }

      async function loadRegistries(hass){
        if (!hass?.connection?.sendMessagePromise || state.registries.entities.length) return;
        const ask = type => hass.connection.sendMessagePromise({type}).catch(() => []);
        const [floors,areas,devices,entities] = await Promise.all([
          ask('config/floor_registry/list'),ask('config/area_registry/list'),ask('config/device_registry/list'),ask('config/entity_registry/list')
        ]);
        state.registries = { floors:Array.isArray(floors)?floors:[], areas:Array.isArray(areas)?areas:[], devices:Array.isArray(devices)?devices:[], entities:Array.isArray(entities)?entities:[] };
      }

      function isJunk(entity, reg){
        const domain = entity.entity_id.split('.')[0];
        const d = norm(entity.attributes.friendly_name || entity.entity_id);
        const badDomains = new Set(['automation','update','conversation','assist_satellite','zone','sun','weather','calendar','tts','stt','device_tracker']);
        if (badDomains.has(domain)) return true;
        if (reg?.hidden_by || reg?.disabled_by) return true;
        const cat = reg?.entity_category || entity.attributes.entity_category;
        if (cat === 'diagnostic') return true;
        if (cat === 'config' && !['input_boolean','scene','script'].includes(domain)) return true;
        if (/(uptime|firmware|rssi|linkquality|debug|raw|counter|snapshot|last seen|last_seen|battery voltage)/.test(d)) return true;
        if (/(bluetooth|gps|distance|latitude|longitude|interval|presence source)/.test(d)) return true;
        return false;
      }

      function roomFromText(txt){
        const n = norm(txt);
        for (const [rid,meta] of Object.entries(ROOM_INFO)) {
          const all = [meta.en,meta.ar,...(meta.aliases||[])].map(norm);
          if (all.some(x => x && n.includes(x))) return rid;
        }
        return null;
      }
      function floorByName(v){
        const n = norm(v);
        if (/(ground|earth|ارض)/.test(n)) return 'ground_floor';
        if (/(first|اول)/.test(n)) return 'first_floor';
        if (/(second|ثان)/.test(n)) return 'second_floor';
        if (/(roof|سطح)/.test(n)) return 'roof';
        return null;
      }

      function classify(entity){
        const domain = entity.entity_id.split('.')[0];
        const dclass = entity.attributes.device_class || '';
        return CAT.find(c => c.domains.includes(domain) && (!c.classes || c.classes.includes(dclass))) || CAT.find(c => c.domains.includes(domain)) || CAT.find(c => c.key === 'other');
      }
      function isNoisyTelemetry(e){
        const txt = norm(`${e.entity_id} ${e.attributes.friendly_name||''}`);
        return /(iphone|ipad|macbook|airpods|watch|latitude|longitude|distance|battery.*phone|gps|tracker)/.test(txt);
      }
      function isOn(e){
        const d = e.entity_id.split('.')[0], s = e.state;
        if (d==='cover') return !['closed','closing'].includes(s);
        if (d==='lock') return s==='unlocked';
        if (d==='alarm_control_panel') return !['disarmed','off'].includes(s);
        return ['on','open','playing','cool','heat','armed_away','armed_home','armed_night','unlocked'].includes(s);
      }
      function friendlyState(e){
        const a=e.attributes||{}, d=e.entity_id.split('.')[0], s=e.state;
        if (['unavailable','unknown'].includes(s)) return s;
        if (d==='light') {
          const out=[s];
          if (a.brightness != null) out.push(`${Math.round((a.brightness/255)*100)}%`);
          if (a.color_temp_kelvin) out.push(`${a.color_temp_kelvin}K`);
          return out.join(' • ');
        }
        if (d==='climate') return [s,a.current_temperature!=null?`Now ${a.current_temperature}°`:null,a.temperature!=null?`Set ${a.temperature}°`:null].filter(Boolean).join(' • ');
        if (d==='sensor') return `${s}${a.unit_of_measurement?` ${a.unit_of_measurement}`:''}`;
        if (d==='cover' && a.current_position != null) return `${s} • ${a.current_position}%`;
        return s;
      }
      function canShowInPrimary(e){
        if (isNoisyTelemetry(e)) return false;
        if (['unknown','unavailable'].includes(e.state) && ['sensor','binary_sensor'].includes(e.entity_id.split('.')[0])) return false;
        return true;
      }

      function resolveLocation(entity, reg, maps){
        const devById = maps.devById;
        const areaId = reg?.area_id || (reg?.device_id ? devById.get(reg.device_id)?.area_id : null);
        const area = areaId ? maps.areaById.get(areaId) : null;
        let room = null, floor = null;
        if (area) {
          room = roomFromText(`${area.name} ${(area.aliases||[]).join(' ')}`);
          floor = maps.floorByArea.get(area.area_id) || null;
        }
        const allTxt = `${entity.entity_id} ${entity.attributes.friendly_name||''} ${(reg?.labels||[]).join(' ')}`;
        room = room || roomFromText(allTxt);
        if (!floor) {
          if (STRUCTURE.first_floor.rooms.includes(room)) floor = 'first_floor';
          else if (STRUCTURE.ground_floor.rooms.includes(room)) floor = 'ground_floor';
          else if (STRUCTURE.roof.rooms.includes(room)) floor = 'roof';
          else floor = floorByName(allTxt) || 'ground_floor';
        }
        if (room === 'master_suite') {
          const child = roomFromText(allTxt.replace(/master suite/ig,''));
          if (SUITE_CHILDREN.includes(child)) room = child;
        }
        return {room,floor};
      }

      function lightSubgroup(entity){
        const txt = norm(`${entity.entity_id} ${entity.attributes.friendly_name||''} ${(entity.attributes.entity_id||[]).join(' ')}`);
        const hit = LIGHT_GROUPS.find(g => g.m.some(m => txt.includes(m)));
        return hit ? hit.key : 'main';
      }

      function compute(hass){
        const entities = Object.values(hass.states || {});
        const regByEntity = new Map(state.registries.entities.map(e => [e.entity_id,e]));
        const areaById = new Map(state.registries.areas.map(a => [a.area_id,a]));
        const devById = new Map(state.registries.devices.map(d => [d.id,d]));
        const floorByArea = new Map();
        for (const area of state.registries.areas) {
          let fid = null;
          if (area.floor_id) {
            const fr = state.registries.floors.find(f => f.floor_id === area.floor_id);
            fid = floorByName(fr?.name || '') || floorByName(area.name);
          }
          if (fid) floorByArea.set(area.area_id, fid);
        }

        const floors = new Map(Object.keys(STRUCTURE).map(f => [f,{id:f,rooms:new Map(),entities:[]} ]));
        const categories = Object.fromEntries(CAT.map(c => [c.key,{total:0,active:0}])) ;

        for (const e of entities) {
          const reg = regByEntity.get(e.entity_id);
          if (isJunk(e, reg)) continue;
          const loc = resolveLocation(e, reg, {areaById,devById,floorByArea});
          if (!loc.room || !floors.has(loc.floor)) continue;
          const floor = floors.get(loc.floor);
          if (!floor.rooms.has(loc.room)) floor.rooms.set(loc.room, []);
          floor.rooms.get(loc.room).push(e); floor.entities.push(e);

          const c = classify(e); categories[c.key].total += 1; if (isOn(e)) categories[c.key].active += 1;
        }

        const ff = floors.get('first_floor');
        const suite = SUITE_CHILDREN.flatMap(r => ff.rooms.get(r) || []);
        if (suite.length) ff.rooms.set('master_suite', suite);

        const out = Array.from(floors.values()).map(f => {
          const rooms = Array.from(f.rooms.entries()).filter(([,arr]) => arr.length);
          return {...f, visibleRooms:rooms, counts:{rooms:rooms.filter(([rid]) => rid !== 'master_suite').length, devices:f.entities.length}};
        }).filter(f => f.visibleRooms.length);

        const all = out.flatMap(f => f.entities);
        state.cache = {
          floors: out,
          categories,
          metrics: {
            floors: out.length,
            rooms: out.reduce((n,f)=>n+f.visibleRooms.filter(([r])=>r!=='master_suite').length,0),
            devices: all.length,
            online: all.filter(e=>e.state!=='unavailable').length,
            alerts: all.filter(e => {
              const dc = e.attributes.device_class || '';
              return ['moisture','smoke','gas','safety','problem','door','window','lock'].includes(dc) && ['on','open','detected','unlocked'].includes(e.state);
            }).length,
            active: all.filter(isOn).length
          }
        };
      }

      function render(){
        document.body.dataset.mode = state.mode; document.body.dataset.family = state.family;
        document.body.classList.toggle('rtl', rtl()); document.documentElement.lang = state.lang; document.documentElement.dir = rtl()?'rtl':'ltr';

        if (state.loading) {
          app.innerHTML = `<div class="topbar">${topbar()}</div><div class="card empty">${esc(t('loading'))}</div>`;
          bindTopbar(); return;
        }

        let body = '';
        if (!state.cache.floors.length) body = `<div class="card empty">${esc(t('empty'))}</div>`;
        else if (state.route.page === 'home') body = homePage();
        else if (state.route.page === 'floor') body = floorPage(state.route.floor);
        else body = roomPage(state.route.floor, state.route.room);

        app.innerHTML = `<div class="topbar">${topbar()}</div><div class="shell">${iconRail()}<div class="content">${body}</div></div>`;
        bindTopbar(); bindActions();
      }

      function formatClock(){
        const d = new Date(state.now);
        return new Intl.DateTimeFormat(state.lang === 'ar' ? 'ar-SA' : 'en-US', {hour:'2-digit', minute:'2-digit'}).format(d);
      }
      function weatherBadge(){
        const hass = state.hass || getHass();
        const states = hass?.states || {};
        const weather = Object.values(states).find(e => e.entity_id?.startsWith('weather.'));
        const tempSensor = Object.values(states).find(e => e.attributes?.unit_of_measurement && /°C|°F/.test(String(e.attributes.unit_of_measurement)) && /outside|outdoor|weather|temp/.test(norm(e.entity_id + ' ' + (e.attributes.friendly_name || ''))));
        const condition = weather?.state || '';
        const temp = weather?.attributes?.temperature ?? tempSensor?.state;
        const unit = weather?.attributes?.temperature_unit || tempSensor?.attributes?.unit_of_measurement || '';
        const icon = /rain|storm/.test(condition) ? 'thunderstorm' : /cloud/.test(condition) ? 'cloud' : /clear|sun|partly/.test(condition) ? 'wb_sunny' : 'partly_cloudy_day';
        const label = condition ? condition.replace(/_/g, ' ') : (state.lang === 'ar' ? 'الطقس' : 'Weather');
        return `<span class="ambient-chip" title="${esc(label)}"><span class="msr">${icon}</span><b>${temp != null ? `${temp}${unit}` : '—'}</b></span>`;
      }

      function topbar(){
        const back = state.route.page !== 'home';
        return `<div>${back?`<button class="back-btn" data-back="1" aria-label="${esc(t('back'))}"><span class="msr">${rtl()?'arrow_forward':'arrow_back'}</span></button>`:''}</div>
          <div class="title">ALNAJDI SMART VILA</div>
          <div class="ambient">${weatherBadge()}<span class="ambient-chip"><span class="msr">schedule</span><b>${formatClock()}</b></span></div>
          <div class="control-groups">
            <div class="seg"><button data-lang="en" class="${state.lang==='en'?'active':''}">${t('langEn')}</button><button data-lang="ar" class="${state.lang==='ar'?'active':''}">${t('langAr')}</button></div>
            <div class="seg"><button data-mode="day" class="${state.mode==='day'?'active':''}">${t('day')}</button><button data-mode="night" class="${state.mode==='night'?'active':''}">${t('night')}</button></div>
            <div class="seg"><button data-family="current" class="${state.family==='current'?'active':''}">${t('current')}</button><button data-family="colors" class="${state.family==='colors'?'active':''}">${t('colors')}</button><button data-family="glass" class="${state.family==='glass'?'active':''}">${t('glass')}</button></div>
          </div>`;
      }

      function contextEntities(){
        if (state.route.page === 'home') return state.cache.floors.flatMap(f => f.entities);
        const floor = state.cache.floors.find(f => f.id===state.route.floor);
        if (!floor) return [];
        if (state.route.page === 'floor') return floor.entities;
        return floor.rooms.get(state.route.room) || [];
      }

      function iconRail(){
        const ents = contextEntities();
        const data = CAT.map(c => {
          const list = ents.filter(e => classify(e).key === c.key);
          if (!list.length) return null;
          return {cfg:c,total:list.length,active:list.filter(isOn).length,alert:list.some(e => ['on','open','unlocked','detected'].includes(e.state) && ['moisture','smoke','door','window','problem'].includes(e.attributes.device_class || ''))};
        }).filter(Boolean);
        if (!data.length) return '';

        return `<section class="icon-rail">${data.map(item => {
          const grad = `background:linear-gradient(145deg, ${item.cfg.color}, rgba(0,0,0,.15));`;
          return `<button class="rail-item ${(item.alert || state.activeCat===item.cfg.key)?'active':''}" data-jump-cat="${item.cfg.key}">
            <span class="rail-icon" style="${grad}"><span class="msr">${item.cfg.icon}</span></span>
            <span class="rail-meta"><b>${esc(t(item.cfg.key))}</b><span>${item.active}/${item.total}</span></span>
          </button>`;
        }).join('')}</section>`;
      }

      function homePage(){
        const m = state.cache.metrics;
        const floorCards = state.cache.floors.map(f => `<article class="card node-card" data-open-floor="${f.id}"><div><h3>${esc(STRUCTURE[f.id][state.lang])}</h3><div class="meta">${esc(t('floorSummary'))}</div></div><div class="rowmeta"><span>${esc(t('rooms'))}: ${f.counts.rooms}</span><span>${esc(t('devices'))}: ${f.counts.devices}</span></div></article>`).join('');
        const quickRooms = state.cache.floors.flatMap(f => f.visibleRooms.filter(([rid]) => rid !== 'master_suite').map(([rid,list]) => ({floor:f.id,rid,count:list.length,active:list.filter(isOn).length})))
          .sort((a,b) => b.active - a.active || b.count - a.count).slice(0,6)
          .map(r => `<article class="card node-card" data-open-room-direct="${r.rid}" data-room-floor="${r.floor}"><div><h3>${esc(ROOM_INFO[r.rid]?.[state.lang]||r.rid)}</h3><div class="meta">${esc(STRUCTURE[r.floor][state.lang])}</div></div><div class="rowmeta"><span>${r.count} ${esc(t('devices'))}</span><span>${r.active} ${esc(t('active'))}</span></div></article>`).join('');
        return `<section class="card hero"><div><h1>${esc(t('home'))}</h1><p>${esc(t('summary'))}</p><div class="chips"><div class="chip"><b>${m.floors}</b><span>${esc(t('floors'))}</span></div><div class="chip"><b>${m.rooms}</b><span>${esc(t('rooms'))}</span></div><div class="chip"><b>${m.devices}</b><span>${esc(t('devices'))}</span></div></div></div><div class="hero-side"><div class="chip"><b>${m.online}</b><span>${esc(t('online'))}</span></div><div class="chip"><b>${m.active}</b><span>${esc(t('active'))}</span></div><div class="chip"><b>${m.alerts}</b><span>${esc(t('alerts'))}</span></div><div class="chip"><b>${CAT.length-1}</b><span>${esc(t('categories'))}</span></div></div></section>
        <section><h3 class="section-title">${esc(t('quickRooms'))}</h3><div class="grid">${quickRooms}</div></section>
        <section><h3 class="section-title">${esc(t('floors'))}</h3><div class="grid">${floorCards}</div></section>`;
      }

      function floorPage(fid){
        const floor = state.cache.floors.find(f=>f.id===fid);
        if (!floor) return `<div class="card empty">${esc(t('noRooms'))}</div>`;
        const suiteVisible = SUITE_CHILDREN.some(r => (floor.rooms.get(r)||[]).length);
        const roomCards = floor.visibleRooms.filter(([rid])=>rid!=='master_suite' && !SUITE_CHILDREN.includes(rid)).map(([rid,list]) => `<article class="card node-card" data-open-room="${rid}"><div><h3>${esc(ROOM_INFO[rid]?.[state.lang]||rid)}</h3><div class="meta">${esc(t('roomSummary'))}</div></div><div class="rowmeta"><span>${list.length} ${esc(t('devices'))}</span><span>→</span></div></article>`).join('');
        const suiteCard = suiteVisible ? `<article class="card node-card" data-open-room="master_suite"><div><h3>${esc(t('suite'))}</h3><div class="meta">${esc(t('contains'))}: ${SUITE_CHILDREN.map(r=>ROOM_INFO[r][state.lang]).join(' • ')}</div></div><div class="rowmeta"><span>${SUITE_CHILDREN.reduce((n,r)=>n+(floor.rooms.get(r)||[]).length,0)} ${esc(t('devices'))}</span><span>→</span></div></article>` : '';
        return `<section class="card hero"><div><h1>${esc(STRUCTURE[fid][state.lang])}</h1><p>${esc(t('floorSummary'))}</p><div class="chips"><div class="chip"><b>${floor.counts.rooms}</b><span>${esc(t('rooms'))}</span></div><div class="chip"><b>${floor.counts.devices}</b><span>${esc(t('entities'))}</span></div><div class="chip"><b>${floor.entities.filter(isOn).length}</b><span>${esc(t('active'))}</span></div></div></div></section>
        <section><h3 class="section-title">${esc(t('rooms'))}</h3><div class="grid">${suiteCard}${roomCards || `<div class="card empty">${esc(t('noRooms'))}</div>`}</div></section>`;
      }

      function roomPage(fid,rid){
        const floor = state.cache.floors.find(f=>f.id===fid);
        if (!floor) return `<div class="card empty">${esc(t('noDevices'))}</div>`;

        let roomEntities = [];
        if (rid === 'master_suite') roomEntities = SUITE_CHILDREN.flatMap(r => floor.rooms.get(r) || []);
        else roomEntities = floor.rooms.get(rid) || [];
        if (!roomEntities.length) return `<div class="card empty">${esc(t('noDevices'))}</div>`;

        const q = norm(state.roomQuery);
        const groups = new Map(CAT.map(c=>[c.key,[]]));
        roomEntities.forEach(e => {
          if (!canShowInPrimary(e)) return;
          if (q) {
            const text = norm(`${e.entity_id} ${e.attributes.friendly_name||''}`);
            if (!text.includes(q)) return;
          }
          const k = classify(e).key;
          if (state.activeCat && state.activeCat !== k) return;
          groups.get(k).push(e);
        });

        const sections = CAT.map(cfg => {
          let list = groups.get(cfg.key) || [];
          if (cfg.key === 'sensors' && !state.showAllSensors) list = list.slice(0, 36);
          if (!list.length) return '';

          if (cfg.key === 'lighting') {
            const sub = new Map(LIGHT_GROUPS.map(g=>[g.key,[]]));
            list.forEach(e => sub.get(lightSubgroup(e)).push(e));
            const block = LIGHT_GROUPS.map(g => sub.get(g.key).length ? `<h4 class="section-title">${esc(t(g.key))}</h4><div class="device-grid">${sub.get(g.key).map(e => deviceCard(e,cfg)).join('')}</div>` : '').join('');
            return `<section class="card device-section" data-cat="${cfg.key}"><h3 class="section-title">${esc(t(cfg.key))} (${list.length})</h3>${block}</section>`;
          }

          const full = (groups.get(cfg.key) || []).length;
          const sensorMore = cfg.key === 'sensors' && full > list.length
            ? `<div style="margin-top:8px"><button class="ghost-btn" data-toggle-sensors="1">${esc(t('showMore'))} (${full - list.length})</button></div>` : '';
          return `<section class="card device-section" data-cat="${cfg.key}"><h3 class="section-title">${esc(t(cfg.key))} (${full})</h3><div class="device-grid">${list.map(e => deviceCard(e,cfg)).join('')}</div>${sensorMore}</section>`;
        }).filter(Boolean).join('');

        const title = rid === 'master_suite' ? t('suite') : (ROOM_INFO[rid]?.[state.lang] || rid);
        return `<section class="card hero"><div><h1>${esc(title)}</h1><p>${esc(t('roomSummary'))}</p><div class="chips"><div class="chip"><b>${roomEntities.length}</b><span>${esc(t('devices'))}</span></div><div class="chip"><b>${roomEntities.filter(e => e.state!=='unavailable').length}</b><span>${esc(t('online'))}</span></div><div class="chip"><b>${roomEntities.filter(isOn).length}</b><span>${esc(t('active'))}</span></div></div></div>${state.cache.metrics.alerts?`<div class="hero-side"><div class="chip alert"><b>${state.cache.metrics.alerts}</b><span>${esc(t('alerts'))}</span></div></div>`:''}</section>
        <div class="toolbar"><input class="search" data-room-search="1" value="${esc(state.roomQuery)}" placeholder="${esc(t('search'))}"/>${state.showAllSensors?`<button class="ghost-btn" data-toggle-sensors="1">${esc(t('showLess'))}</button>`:''}</div>${sections}`;
      }

      function deviceCard(e,cfg){
        const domain = e.entity_id.split('.')[0], attrs = e.attributes || {}, on = isOn(e);
        const grad = on ? cfg.gradOn : cfg.gradOff;
        const name = esc(attrs.friendly_name || e.entity_id);
        let controls = '';

        if (domain==='cover') controls = `<button class="ibtn" data-cover="open" data-eid="${e.entity_id}" title="${esc(t('open'))}"><span class="msr">keyboard_arrow_up</span></button><button class="ibtn" data-cover="stop" data-eid="${e.entity_id}" title="${esc(t('stop'))}"><span class="msr">stop</span></button><button class="ibtn" data-cover="close" data-eid="${e.entity_id}" title="${esc(t('close'))}"><span class="msr">keyboard_arrow_down</span></button>`;
        else if (domain==='lock') controls = `<button class="ibtn" data-lock="${e.state==='locked'?'unlock':'lock'}" data-eid="${e.entity_id}"><span class="msr">${e.state==='locked'?'lock_open':'lock'}</span></button>`;
        else if (domain==='climate' || domain==='media_player' || domain==='camera' || domain==='alarm_control_panel') controls = `<button class="ibtn" data-more="${e.entity_id}" title="${esc(t('details'))}"><span class="msr">more_horiz</span></button>`;
        else if (domain==='fan') controls = `<button class="ibtn" data-toggle-eid="${e.entity_id}"><span class="msr">power_settings_new</span></button>`;

        const showBrightness = domain==='light' && attrs.brightness != null;
        const showTemp = domain==='light' && attrs.color_temp_kelvin != null;
        const showClimateSet = domain==='climate' && attrs.temperature != null;
        const showFanSpeed = domain==='fan' && attrs.percentage != null;
        const showMediaVol = domain==='media_player' && attrs.volume_level != null;
        const showNumber = ['number','input_number'].includes(domain);
        const showSelect = ['select','input_select'].includes(domain) && Array.isArray(attrs.options) && attrs.options.length;

        return `<article class="device-card" style="--device-grad:${grad};--icon-color:${cfg.color}" data-eid="${e.entity_id}">
          <div class="icon-w"><span class="msr">${cfg.icon}</span></div>
          <div class="device-main"><div class="name">${name}</div><div class="state">${esc(friendlyState(e))}</div></div>
          <div class="tail">${controls}</div>
          ${(showBrightness||showTemp||showClimateSet||showFanSpeed||showMediaVol||showNumber||showSelect) ? `<div class="cap-row">
            ${showBrightness?`<div class="slider-wrap"><span class="msr">brightness_6</span><input type="range" min="1" max="255" value="${attrs.brightness}" data-brightness="${e.entity_id}"/><span>${Math.round((attrs.brightness/255)*100)}%</span></div>`:''}
            ${showTemp?`<div class="slider-wrap"><span class="msr">device_thermostat</span><input type="range" min="2000" max="6500" step="50" value="${attrs.color_temp_kelvin}" data-colortemp="${e.entity_id}"/><span>${attrs.color_temp_kelvin}K</span></div>`:''}
            ${showClimateSet?`<div class="slider-wrap"><span class="msr">thermostat</span><input type="range" min="${attrs.min_temp || 16}" max="${attrs.max_temp || 32}" step="0.5" value="${attrs.temperature}" data-climate-temp="${e.entity_id}"/><span>${attrs.temperature}°</span></div>`:''}
            ${showFanSpeed?`<div class="slider-wrap"><span class="msr">air</span><input type="range" min="0" max="100" step="1" value="${attrs.percentage}" data-fan-speed="${e.entity_id}"/><span>${attrs.percentage}%</span></div>`:''}
            ${showMediaVol?`<div class="slider-wrap"><span class="msr">volume_up</span><input type="range" min="0" max="100" step="1" value="${Math.round((attrs.volume_level || 0)*100)}" data-media-volume="${e.entity_id}"/><span>${Math.round((attrs.volume_level || 0)*100)}%</span></div>`:''}
            ${showNumber?`<div class="slider-wrap"><span class="msr">tune</span><input type="range" min="${attrs.min ?? 0}" max="${attrs.max ?? 100}" step="${attrs.step ?? 1}" value="${Number(e.state) || attrs.min || 0}" data-number="${e.entity_id}"/><span>${esc(e.state)}</span></div>`:''}
            ${showSelect?`<div class="slider-wrap"><span class="msr">checklist</span><select data-select="${e.entity_id}" style="width:100%;border:1px solid var(--line);background:var(--surface-2);color:var(--text);border-radius:8px;padding:6px 8px;">${attrs.options.map(opt => `<option value="${esc(opt)}" ${String(opt)===String(e.state)?'selected':''}>${esc(opt)}</option>`).join('')}</select><span></span></div>`:''}
          </div>`:''}
        </article>`;
      }

      async function call(domain, service, data){ const hass=getHass(); if(!hass) return; try{ await hass.callService(domain,service,data);}catch(_){} }
      function moreInfo(entityId){
        try { const ev = new Event('hass-more-info', { bubbles:true, composed:true }); ev.detail = { entityId }; window.parent?.document?.querySelector('home-assistant')?.dispatchEvent(ev); } catch (_) {}
      }

      function bindTopbar(){
        app.querySelectorAll('[data-lang]').forEach(b => b.onclick = () => { state.lang=b.dataset.lang; localStorage.setItem('villa.lang',state.lang); render(); });
        app.querySelectorAll('[data-mode]').forEach(b => b.onclick = () => { state.mode=b.dataset.mode; localStorage.setItem('villa.mode',state.mode); render(); });
        app.querySelectorAll('[data-family]').forEach(b => b.onclick = () => { state.family=b.dataset.family; localStorage.setItem('villa.family',state.family); render(); });
        const back = app.querySelector('[data-back]');
        if (back) back.onclick = () => {
          if (state.route.page === 'room') state.route = {page:'floor',floor:state.route.floor,room:null};
          else state.route = {page:'home',floor:null,room:null};
          render();
        };
      }

      function bindActions(){
        app.querySelectorAll('[data-open-floor]').forEach(c => c.onclick = () => { state.route = {page:'floor',floor:c.dataset.openFloor,room:null}; state.activeCat=null; render(); });
        app.querySelectorAll('[data-open-room]').forEach(c => c.onclick = () => { state.route = {page:'room',floor:state.route.floor || 'first_floor',room:c.dataset.openRoom}; state.activeCat=null; render(); });
        app.querySelectorAll('[data-open-room-direct]').forEach(c => c.onclick = () => { state.route = {page:'room',floor:c.dataset.roomFloor,room:c.dataset.openRoomDirect}; state.activeCat=null; render(); });

        app.querySelectorAll('[data-jump-cat]').forEach(btn => btn.onclick = () => {
          state.activeCat = btn.dataset.jumpCat;
          const target = app.querySelector(`[data-cat="${btn.dataset.jumpCat}"]`);
          if (target) target.scrollIntoView({behavior:'smooth',block:'start'});
          else {
            const match = state.cache.floors.flatMap(f => f.visibleRooms.map(([rid,list]) => ({floor:f.id,rid,list})))
              .find(x => x.list.some(e => classify(e).key === state.activeCat));
            if (match) state.route = {page:'room',floor:match.floor,room:match.rid};
            render();
          }
        });

        app.querySelectorAll('.device-card[data-eid]').forEach(card => card.onclick = (ev) => {
          if (ev.target.closest('button,input,select')) return;
          const eid = card.dataset.eid, domain = eid.split('.')[0];
          if (['light','switch','fan','input_boolean'].includes(domain)) call(domain, 'toggle', {entity_id:eid});
          else if (domain==='scene') call('scene','turn_on',{entity_id:eid});
          else if (['button','input_button'].includes(domain)) call(domain,'press',{entity_id:eid});
          else moreInfo(eid);
        });

        app.querySelectorAll('[data-cover]').forEach(b => b.onclick = (e) => { e.stopPropagation(); call('cover',{open:'open_cover',close:'close_cover',stop:'stop_cover'}[b.dataset.cover],{entity_id:b.dataset.eid}); });
        app.querySelectorAll('[data-lock]').forEach(b => b.onclick = (e) => { e.stopPropagation(); call('lock',b.dataset.lock,{entity_id:b.dataset.eid}); });
        app.querySelectorAll('[data-toggle-eid]').forEach(b => b.onclick = (e) => { e.stopPropagation(); const eid=b.dataset.toggleEid; call(eid.split('.')[0], 'toggle', {entity_id:eid}); });
        app.querySelectorAll('[data-more]').forEach(b => b.onclick = (e) => { e.stopPropagation(); moreInfo(b.dataset.more); });

        app.querySelectorAll('[data-brightness]').forEach(i => i.onchange = (e) => {
          e.stopPropagation(); const val = Number(i.value); call('light','turn_on',{entity_id:i.dataset.brightness, brightness: val});
        });
        app.querySelectorAll('[data-colortemp]').forEach(i => i.onchange = (e) => {
          e.stopPropagation(); const val = Number(i.value); call('light','turn_on',{entity_id:i.dataset.colortemp, color_temp_kelvin: val});
        });
        app.querySelectorAll('[data-climate-temp]').forEach(i => i.onchange = (e) => {
          e.stopPropagation(); call('climate','set_temperature',{entity_id:i.dataset.climateTemp, temperature:Number(i.value)});
        });
        app.querySelectorAll('[data-fan-speed]').forEach(i => i.onchange = (e) => {
          e.stopPropagation(); call('fan','set_percentage',{entity_id:i.dataset.fanSpeed, percentage:Number(i.value)});
        });
        app.querySelectorAll('[data-media-volume]').forEach(i => i.onchange = (e) => {
          e.stopPropagation(); call('media_player','volume_set',{entity_id:i.dataset.mediaVolume, volume_level:Number(i.value)/100});
        });
        app.querySelectorAll('[data-number]').forEach(i => i.onchange = (e) => {
          e.stopPropagation(); const domain = i.dataset.number.split('.')[0]; call(domain,'set_value',{entity_id:i.dataset.number, value:Number(i.value)});
        });
        app.querySelectorAll('[data-select]').forEach(s => s.onchange = (e) => {
          e.stopPropagation(); const domain = s.dataset.select.split('.')[0]; call(domain,'select_option',{entity_id:s.dataset.select, option:s.value});
        });
        const roomSearch = app.querySelector('[data-room-search]');
        if (roomSearch) roomSearch.oninput = () => { state.roomQuery = roomSearch.value; render(); };
        app.querySelectorAll('[data-toggle-sensors]').forEach(b => b.onclick = () => { state.showAllSensors = !state.showAllSensors; render(); });
      }

      async function refresh(){
        const hass = getHass();
        if (!hass) { state.loading=true; render(); return; }
        await loadRegistries(hass);

        const ids = Object.keys(hass.states || {}).sort();
        const hash = ids.map(i => `${i}:${hass.states[i]?.state}:${hass.states[i]?.last_changed || ''}`).join('|');
        if (hash !== state.hash || state.loading) {
          state.hash = hash;
          compute(hass);
          state.loading = false;

          if (state.route.page === 'floor' && !state.cache.floors.some(f => f.id === state.route.floor)) state.route = {page:'home',floor:null,room:null};
          if (state.route.page === 'room') {
            const floor = state.cache.floors.find(f => f.id===state.route.floor);
            const valid = state.route.room === 'master_suite' ? SUITE_CHILDREN.some(r => (floor?.rooms.get(r)||[]).length) : (floor?.rooms.get(state.route.room)||[]).length;
            if (!valid) state.route = {page:'floor',floor:state.route.floor,room:null};
          }
          render();
        }
      }

      render();
      refresh();
      setInterval(() => { state.now = Date.now(); if (!state.loading) render(); }, 10000);
      setInterval(refresh, 3000);
    })();
  </script>
</body>
</html>
