<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ALNAJDI SMART VILA</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap');

    :root {
      --radius-xl: 26px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --shadow: 0 22px 50px rgba(0,0,0,.35);
      --shadow-soft: 0 8px 22px rgba(0,0,0,.24);
      --ease: 180ms cubic-bezier(.2,.6,.2,1);
      --top-safe: env(safe-area-inset-top, 0px);
      --bottom-safe: env(safe-area-inset-bottom, 0px);
      --bg: #090b10;
      --bg-accent: radial-gradient(1000px 600px at -10% -20%, rgba(71,98,179,.35) 0%, transparent 52%), radial-gradient(980px 620px at 120% -20%, rgba(47,132,188,.20) 0%, transparent 52%), #090b10;
      --surface: #14171e;
      --surface-2: #1a1f29;
      --surface-3: #212735;
      --line: rgba(255,255,255,.1);
      --line-strong: rgba(255,255,255,.2);
      --text: #f4f6fb;
      --muted: #abb5c9;
      --good: #50d88e;
      --warn: #ffbc55;
      --danger: #ff5e74;
      --info: #53b7ff;
      --glass: rgba(255,255,255,.05);
    }

    body[data-family='current'][data-mode='day'] {
      --bg: #eef3fb;
      --bg-accent: radial-gradient(1100px 760px at -10% -25%, rgba(81,141,255,.36) 0%, transparent 56%), radial-gradient(1000px 640px at 115% -10%, rgba(125,169,255,.27) 0%, transparent 55%), #eef3fb;
      --surface: #ffffff;
      --surface-2: #f7faff;
      --surface-3: #eef4ff;
      --line: rgba(30,56,94,.16);
      --line-strong: rgba(30,56,94,.24);
      --text: #15223a;
      --muted: #607391;
      --glass: rgba(0,0,0,.03);
      --shadow: 0 12px 30px rgba(31,69,129,.15);
      --shadow-soft: 0 8px 20px rgba(38,77,137,.12);
    }

    body[data-family='colors'][data-mode='night'] {
      --bg: #07090f;
      --bg-accent: radial-gradient(1150px 700px at -15% -25%, rgba(102,71,224,.38) 0%, transparent 50%), radial-gradient(1000px 680px at 120% -10%, rgba(27,180,162,.22) 0%, transparent 52%), #07090f;
      --surface: #151820;
      --surface-2: #1b2030;
      --surface-3: #252d40;
      --line: rgba(255,255,255,.1);
      --line-strong: rgba(255,255,255,.2);
      --text: #f7f8fd;
      --muted: #b4bed3;
      --shadow: 0 22px 55px rgba(0,0,0,.45);
      --shadow-soft: 0 10px 24px rgba(0,0,0,.34);
      --glass: rgba(255,255,255,.04);
    }

    body[data-family='colors'][data-mode='day'] {
      --bg: #f2f6ff;
      --bg-accent: radial-gradient(1100px 740px at -10% -25%, rgba(117,136,255,.34) 0%, transparent 54%), radial-gradient(980px 640px at 120% -10%, rgba(66,187,208,.22) 0%, transparent 52%), #f2f6ff;
      --surface: #fff;
      --surface-2: #f9fbff;
      --surface-3: #eef3ff;
      --line: rgba(43,68,112,.15);
      --line-strong: rgba(43,68,112,.23);
      --text: #132138;
      --muted: #5e7190;
      --glass: rgba(0,0,0,.03);
      --shadow: 0 12px 30px rgba(38,71,140,.14);
      --shadow-soft: 0 7px 18px rgba(38,71,140,.10);
    }

    body[data-family='glass'][data-mode='night'] {
      --bg: #04060a;
      --bg-accent: radial-gradient(1050px 680px at -10% -20%, rgba(111,173,255,.38) 0%, transparent 50%), radial-gradient(980px 650px at 115% -15%, rgba(166,190,255,.22) 0%, transparent 55%), #04060a;
      --surface: linear-gradient(150deg, rgba(255,255,255,.14), rgba(255,255,255,.02));
      --surface-2: linear-gradient(150deg, rgba(255,255,255,.18), rgba(255,255,255,.03));
      --surface-3: rgba(255,255,255,.10);
      --line: rgba(255,255,255,.2);
      --line-strong: rgba(255,255,255,.32);
      --text: #f6f9ff;
      --muted: #cad5ea;
      --glass: rgba(255,255,255,.08);
      --shadow: 0 26px 65px rgba(0,0,0,.48);
      --shadow-soft: 0 10px 26px rgba(0,0,0,.32);
      backdrop-filter: saturate(140%);
    }

    body[data-family='glass'][data-mode='day'] {
      --bg: #ecf6ff;
      --bg-accent: radial-gradient(1100px 720px at -10% -20%, rgba(117,193,255,.46) 0%, transparent 52%), radial-gradient(1000px 640px at 120% -15%, rgba(167,188,255,.34) 0%, transparent 55%), #ecf6ff;
      --surface: linear-gradient(150deg, rgba(255,255,255,.8), rgba(255,255,255,.45));
      --surface-2: linear-gradient(150deg, rgba(255,255,255,.88), rgba(255,255,255,.56));
      --surface-3: rgba(255,255,255,.66);
      --line: rgba(79,118,176,.25);
      --line-strong: rgba(79,118,176,.35);
      --text: #12233d;
      --muted: #5a7092;
      --glass: rgba(255,255,255,.45);
      --shadow: 0 14px 32px rgba(47,84,145,.2);
      --shadow-soft: 0 8px 20px rgba(47,84,145,.14);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg-accent);
      color: var(--text);
      font-family: Inter, Tajawal, sans-serif;
      overflow: hidden;
      transition: background .25s ease, color .2s ease;
    }

    body.rtl { font-family: Tajawal, Inter, sans-serif; }

    .app {
      max-width: 1560px;
      margin: 0 auto;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: calc(var(--top-safe) + 10px) 12px calc(var(--bottom-safe) + 22px);
      gap: 12px;
      overflow: auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(14px) saturate(135%);
      -webkit-backdrop-filter: blur(14px) saturate(135%);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 45;
      padding: 8px;
      display: grid;
      gap: 8px;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      background: linear-gradient(to bottom, rgba(0,0,0,.45), rgba(0,0,0,.02));
      border-radius: var(--radius-lg);
    }

    .topbar .title {
      text-align: center;
      font-size: clamp(13px, 2.1vw, 22px);
      letter-spacing: .2em;
      font-weight: 800;
      white-space: nowrap;
      color: var(--text);
      opacity: .95;
    }

    .seg {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      max-width: 100%;
      overflow: auto hidden;
      scrollbar-width: none;
    }

    .seg::-webkit-scrollbar { display:none; }

    .seg button, .btn {
      border: 0;
      border-radius: 999px;
      padding: 7px 11px;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--ease);
      white-space: nowrap;
    }

    .seg button.active, .btn.active {
      color: var(--text);
      background: rgba(255,255,255,.13);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08), 0 0 0 1px rgba(0,0,0,.08);
    }

    .back-btn {
      min-width: 38px;
      min-height: 38px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--text);
      font-size: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .hero {
      padding: 16px;
      display: grid;
      gap: 12px;
      grid-template-columns: 1.2fr .8fr;
      align-items: stretch;
    }

    .hero-main h1 { margin: 0; font-size: clamp(20px, 3vw, 34px); }
    .hero-main p { margin: 8px 0 0; color: var(--muted); }
    .hero-meta { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 8px; margin-top: 14px; }

    .stat-chip {
      padding: 10px;
      border-radius: 12px;
      background: var(--glass);
      border: 1px solid var(--line);
      text-align: center;
    }

    .stat-chip b { font-size: 18px; display:block; }
    .stat-chip span { font-size: 11px; color: var(--muted); }

    .hero-side {
      display: grid;
      grid-template-columns: repeat(2,minmax(0,1fr));
      gap: 8px;
      align-content: start;
    }

    .summary-card { padding: 10px; border-radius: 14px; border:1px solid var(--line); background: var(--glass); }
    .summary-card h4 { margin: 0; font-size: 12px; color: var(--muted); }
    .summary-card p { margin: 6px 0 0; font-size: 19px; font-weight: 800; }

    .section-title {
      margin: 2px 0 8px;
      font-size: 14px;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .floors-grid, .rooms-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
    }

    .floor-card, .room-card {
      padding: 14px;
      cursor: pointer;
      transition: transform var(--ease), border-color var(--ease), box-shadow var(--ease);
      min-height: 112px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      position: relative;
      overflow: hidden;
    }

    .floor-card:hover, .room-card:hover { transform: translateY(-2px); border-color: var(--line-strong); }
    .card-title { font-size: 17px; font-weight: 700; }
    .card-sub { font-size: 12px; color: var(--muted); margin-top: 5px; }
    .card-meta { display:flex; justify-content:space-between; font-size: 11px; color: var(--muted); }

    .suite-badge {
      display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:4px 8px;border-radius:999px;
      background: rgba(255,207,92,.14); color: #ffc96e; border:1px solid rgba(255,207,92,.3);
    }

    .devices-layout { display: grid; gap: 14px; }
    .device-section { padding: 12px; }
    .device-grid { display:grid; gap:10px; grid-template-columns: repeat(auto-fill,minmax(250px,1fr)); }
    .subgroup-wrap { display:grid; gap:10px; }
    .subgroup { border:1px solid var(--line); border-radius: 14px; padding: 10px; background: var(--glass); }
    .subgroup h4 { margin: 0 0 8px; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }

    .device-card {
      min-height: 76px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(95deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      display:grid;
      grid-template-columns: 58px 1fr auto;
      align-items:center;
      overflow:hidden;
      position:relative;
      isolation: isolate;
      cursor:pointer;
      transition: transform var(--ease), box-shadow var(--ease), border-color var(--ease);
    }

    .device-card::before {
      content:'';
      position:absolute;
      inset:0;
      background: var(--device-grad, linear-gradient(95deg, rgba(72,132,255,.42), rgba(72,132,255,0) 58%));
      opacity: .9;
      z-index:-1;
    }

    .device-card:hover { transform: translateY(-1px); box-shadow: 0 12px 25px rgba(0,0,0,.24); border-color: rgba(255,255,255,.2); }
    .device-icon-wrap {
      height: 100%;
      display:flex;
      align-items:center;
      justify-content:center;
      background: radial-gradient(circle at 55% 45%, rgba(255,255,255,.16), rgba(255,255,255,.04));
      border-inline-end: 1px solid rgba(255,255,255,.08);
    }
    .device-icon { font-size: 25px; filter: drop-shadow(0 0 9px rgba(255,255,255,.22)); }
    .device-main { padding: 8px 10px; }
    .device-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .device-state { font-size: 12px; color: rgba(255,255,255,.82); margin-top: 3px; white-space: nowrap; overflow:hidden; text-overflow:ellipsis; }
    body[data-mode='day'] .device-state { color: rgba(18,31,57,.78); }
    .device-meta-line { margin-top: 5px; font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dimmer { width: 100%; margin-top: 6px; accent-color: #64bbff; }

    .device-tail { padding-inline: 8px; display:flex; align-items:center; gap:7px; }
    .tiny { border:1px solid rgba(255,255,255,.18); background:rgba(255,255,255,.08); color:var(--text); border-radius:9px; height:30px; min-width:30px; cursor:pointer; }

    .empty, .loading {
      padding: 24px;
      text-align:center;
      color: var(--muted);
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius-lg);
      background: var(--glass);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(2,6,14,.62);
      z-index: 99;
      display:none;
      padding: 16px;
      align-items:center;
      justify-content:center;
    }

    .modal.show { display:flex; }
    .modal-panel {
      width:min(520px,100%);
      padding:16px;
      border-radius:20px;
      border:1px solid var(--line);
      background: var(--surface-2);
      box-shadow: var(--shadow);
    }

    .modal-row { display:flex; gap:8px; flex-wrap: wrap; margin-top: 10px; }

    .footer-note { text-align:center; color:var(--muted); font-size:11px; margin-top: 10px; }

    .icon-rail {
      position: sticky;
      top: 72px;
      z-index: 30;
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(88px,1fr));
      gap: 8px;
      padding: 8px;
    }

    .rail-item {
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--surface-2);
      padding: 8px 6px;
      display: grid;
      justify-items: center;
      gap: 3px;
      cursor: pointer;
      transition: all var(--ease);
    }
    .rail-item .ic {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background: rgba(255,255,255,.1);
      font-size: 17px;
    }
    .rail-item .lb { font-size: 10px; color: var(--muted); text-align:center; line-height: 1.2; }
    .rail-item .ct { font-size: 11px; font-weight: 800; }
    .rail-item.active { border-color: var(--line-strong); transform: translateY(-1px); }
    .rail-item.alert .ic { background: rgba(255,94,116,.2); box-shadow: 0 0 14px rgba(255,94,116,.28); }

    @media (max-width: 980px) {
      .topbar { grid-template-columns: 1fr; }
      .topbar .title { order: -1; }
      .hero { grid-template-columns: 1fr; }
      .hero-side { grid-template-columns: repeat(4,minmax(0,1fr)); }
    }

    @media (max-width: 720px) {
      .app { padding-inline: 10px; }
      .hero-meta { grid-template-columns: repeat(2,minmax(0,1fr)); }
      .hero-side { grid-template-columns: repeat(2,minmax(0,1fr)); }
      .floors-grid, .rooms-grid, .device-grid { grid-template-columns: 1fr; }
      .device-card { grid-template-columns: 54px 1fr auto; }
      .seg button { padding: 8px 10px; }
      .icon-rail {
        display: flex;
        overflow-x: auto;
        gap: 8px;
        top: 110px;
      }
      .rail-item { min-width: 90px; }
    }
  </style>
</head>

        { key: 'lighting', domains: ['light'], icon: '💡', gradOn: 'linear-gradient(95deg, rgba(255,198,64,.58), rgba(255,198,64,0) 64%)', gradOff: 'linear-gradient(95deg, rgba(255,198,64,.2), rgba(255,198,64,0) 64%)' },

        { key: 'security', domains: ['alarm_control_panel','binary_sensor'], classes: ['safety','problem'], icon: '🛡️', gradOn: 'linear-gradient(95deg, rgba(123,214,128,.56), rgba(123,214,128,0) 64%)', gradOff: 'linear-gradient(95deg, rgba(123,214,128,.2), rgba(123,214,128,0) 64%)' },
        { key: 'cameras', domains: ['camera'], icon: '📷', gradOn: 'linear-gradient(95deg, rgba(98,199,255,.56), rgba(98,199,255,0) 64%)', gradOff: 'linear-gradient(95deg, rgba(98,199,255,.23), rgba(98,199,255,0) 64%)' },
        { key: 'media', domains: ['media_player','remote'], icon: '🎵', gradOn: 'linear-gradient(95deg, rgba(192,134,255,.56), rgba(192,134,255,0) 64%)', gradOff: 'linear-gradient(95deg, rgba(192,134,255,.23), rgba(192,134,255,0) 64%)' },
        { key: 'curtains', domains: ['cover'], icon: '🪟', gradOn: 'linear-gradient(95deg, rgba(132,191,255,.56), rgba(132,191,255,0) 64%)', gradOff: 'linear-gradient(95deg, rgba(132,191,255,.23), rgba(132,191,255,0) 64%)' },
        { key: 'doors_windows', domains: ['binary_sensor'], classes: ['door','window','opening','garage_door'], icon: '🚪', gradOn: 'linear-gradient(95deg, rgba(255,102,88,.56), rgba(255,102,88,0) 64%)', gradOff: 'linear-gradient(95deg, rgba(255,102,88,.23), rgba(255,102,88,0) 64%)' },
        { key: 'power', domains: ['switch','fan'], icon: '🔌', gradOn: 'linear-gradient(95deg, rgba(82,196,255,.56), rgba(82,196,255,0) 64%)', gradOff: 'linear-gradient(95deg, rgba(82,196,255,.23), rgba(82,196,255,0) 64%)' },
        { key: 'appliances', domains: ['vacuum','button','input_button'], icon: '🧺', gradOn: 'linear-gradient(95deg, rgba(149,176,255,.56), rgba(149,176,255,0) 64%)', gradOff: 'linear-gradient(95deg, rgba(149,176,255,.23), rgba(149,176,255,0) 64%)' },
        { key: 'locks', domains: ['lock'], icon: '🔒', gradOn: 'linear-gradient(95deg, rgba(125,218,126,.56), rgba(125,218,126,0) 64%)', gradOff: 'linear-gradient(95deg, rgba(125,218,126,.23), rgba(125,218,126,0) 64%)' },
        { key: 'water', domains: ['water_heater'], classes: ['moisture'], icon: '💧', gradOn: 'linear-gradient(95deg, rgba(90,178,255,.56), rgba(90,178,255,0) 64%)', gradOff: 'linear-gradient(95deg, rgba(90,178,255,.23), rgba(90,178,255,0) 64%)' },
        { key: 'air_quality', domains: ['sensor'], classes: ['aqi','pm25','pm10','carbon_monoxide','carbon_dioxide','volatile_organic_compounds'], icon: '🫧', gradOn: 'linear-gradient(95deg, rgba(126,219,144,.56), rgba(126,219,144,0) 64%)', gradOff: 'linear-gradient(95deg, rgba(126,219,144,.23), rgba(126,219,144,0) 64%)' },
        { key: 'sensors', domains: ['sensor','binary_sensor'], icon: '📊', gradOn: 'linear-gradient(95deg, rgba(255,176,81,.56), rgba(255,176,81,0) 64%)', gradOff: 'linear-gradient(95deg, rgba(255,176,81,.23), rgba(255,176,81,0) 64%)' },
        { key: 'other', domains: ['scene','script','number','select','input_number','input_select','input_boolean'], icon: '⚙️', gradOn: 'linear-gradient(95deg, rgba(173,189,214,.56), rgba(173,189,214,0) 64%)', gradOff: 'linear-gradient(95deg, rgba(173,189,214,.23), rgba(173,189,214,0) 64%)' }
      ];

      const state = {
        lang: localStorage.getItem('villa.lang') || 'en',
        mode: localStorage.getItem('villa.mode') || 'night',
        family: localStorage.getItem('villa.family') || 'colors',
        route: { page: 'home', floorId: null, roomId: null },
        hass: null,
        lastStateHash: '',
        cache: { floors: [], metrics: {}, roomMap: {} },
        registries: { floors: [], areas: [], devices: [], entities: [] },
        loading: true,
        error: ''
      };

      const app = document.getElementById('app');
      const modal = document.getElementById('modal');

      const t = (k) => I18N[state.lang][k] || k;
      const isRTL = () => state.lang === 'ar';

      function safeText(value) {
        return String(value ?? '').replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
      }

      function normalize(str) {
        return String(str || '').toLowerCase().replace(/[_-]+/g, ' ').replace(/\s+/g, ' ').trim();
      }

      function detectRoomFromText(textRaw) {
        const text = normalize(textRaw);
        if (!text) return null;
        for (const [roomId, room] of Object.entries(ROOMS)) {
          const names = [room.en, room.ar, ...(room.aliases || [])].map(normalize);
          if (names.some((name) => name && text.includes(name))) return roomId;
        }
        return null;
      }

      function getHass() {
        if (state.hass && state.hass.states) return state.hass;
        try {
          const root = window.parent?.document?.querySelector('home-assistant');
          const hass = root?.hass
            || root?.shadowRoot?.querySelector('home-assistant-main')?.hass
            || root?.shadowRoot?.querySelector('home-assistant-main')?.shadowRoot?.querySelector('app-drawer-layout partial-panel-resolver')?.hass;
          if (hass && hass.states) {
            state.hass = hass;
            return hass;
          }
        } catch (_) {}
        return null;
      }

      async function fetchRegistries(hass) {
        if (!hass?.connection?.sendMessagePromise) return;
        const req = (type) => hass.connection.sendMessagePromise({ type }).catch(() => []);
        const [floors, areas, devices, entities] = await Promise.all([
          req('config/floor_registry/list'),
          req('config/area_registry/list'),
          req('config/device_registry/list'),
          req('config/entity_registry/list')
        ]);
        state.registries = {
          floors: Array.isArray(floors) ? floors : [],
          areas: Array.isArray(areas) ? areas : [],
          devices: Array.isArray(devices) ? devices : [],
          entities: Array.isArray(entities) ? entities : []
        };
      }

      function floorIdByName(name) {
        const key = normalize(name);
        if (key.includes('ground') || key.includes('ارض')) return 'ground_floor';
        if (key.includes('first') || key.includes('اول')) return 'first_floor';
        if (key.includes('second') || key.includes('ثان')) return 'second_floor';
        if (key.includes('roof') || key.includes('سطح')) return 'roof';
        return null;
      }

      function buildAreaMap() {
        const areaById = new Map(state.registries.areas.map((a) => [a.area_id, a]));
        const floorByArea = new Map();

        for (const area of state.registries.areas) {
          let floorId = null;
          if (area.floor_id) {
            const regFloor = state.registries.floors.find((f) => f.floor_id === area.floor_id);
            floorId = floorIdByName(regFloor?.name || regFloor?.aliases?.[0] || '') || floorIdByName(area.name);
          }
          floorId = floorId || floorIdByName(area.name) || null;
          if (floorId) floorByArea.set(area.area_id, floorId);
        }
        return { areaById, floorByArea };
      }

      function isJunkEntity(entity, reg) {
        const id = entity.entity_id;
        const domain = id.split('.')[0];
        const attrs = entity.attributes || {};
        const category = reg?.entity_category || attrs.entity_category;
        const name = normalize(attrs.friendly_name || id);

        const blockedDomains = new Set(['automation', 'update', 'conversation', 'assist_satellite', 'person', 'zone', 'sun', 'weather', 'calendar', 'tts', 'stt', 'tts_engine']);
        if (blockedDomains.has(domain)) return true;
        if (reg?.hidden_by || reg?.disabled_by) return true;
        if (category === 'diagnostic' || category === 'config') return true;
        if (/(snapshot|counter|firmware|uptime|rssi|linkquality|last seen|last_seen|debug|raw|signal)/.test(name)) return true;
        if (/^(sensor|binary_sensor)\..*(voltage|current|power_factor)$/.test(id)) return true;
        return false;
      }

      function classifyCategory(entity) {
        const domain = entity.entity_id.split('.')[0];
        const dclass = entity.attributes.device_class || '';
        if (domain === 'binary_sensor' && ['door','window','opening','garage_door'].includes(dclass)) {
          return CATEGORY_CONFIG.find((c) => c.key === 'doors_windows');
        }
        if (domain === 'sensor' && ['aqi','pm25','pm10','carbon_monoxide','carbon_dioxide','volatile_organic_compounds'].includes(dclass)) {
          return CATEGORY_CONFIG.find((c) => c.key === 'air_quality');
        }
        const cfg = CATEGORY_CONFIG.find((c) => c.domains.includes(domain) && (!c.classes || c.classes.includes(dclass)))
          || CATEGORY_CONFIG.find((c) => c.domains.includes(domain))
          || CATEGORY_CONFIG.find((c) => c.key === 'other');
        return cfg;
      }

      function detectLightSubgroup(entity) {
        const n = normalize(`${entity.attributes.friendly_name || ''} ${entity.entity_id}`);
        if (/spot ?light|spotlight|down ?light|focus light|mini light/.test(n)) return 'spot_lights';
        if (/cove|covelight/.test(n)) return 'cove_lights';
        if (/led strip|strip|rgb strip/.test(n)) return 'led_strips';
        if (/wall light/.test(n)) return 'wall_lights';
        if (/bed light|bedside/.test(n)) return 'bed_lights';
        if (/ceiling light/.test(n)) return 'ceiling_lights';
        if (/lamp/.test(n)) return 'lamps';
        if (/accent/.test(n)) return 'accent_lights';
        return 'main_lights';
      }

      function roomAndFloorForEntity(entity, regEntity, areaMap, deviceById) {
        const attrs = entity.attributes || {};
        const areaId = regEntity?.area_id || (regEntity?.device_id ? deviceById.get(regEntity.device_id)?.area_id : null);
        const area = areaId ? areaMap.areaById.get(areaId) : null;
        let roomId = null;
        let floorId = null;

        if (area) {
          roomId = detectRoomFromText(`${area.name} ${area.aliases || ''}`);
          floorId = areaMap.floorByArea.get(area.area_id) || null;
        }

        const refText = `${attrs.friendly_name || ''} ${entity.entity_id}`;
        if (!roomId) roomId = detectRoomFromText(refText);

        if (!floorId) {
          if (roomId && REQUIRED_STRUCTURE.first_floor.rooms.includes(roomId)) floorId = 'first_floor';
          else if (roomId && REQUIRED_STRUCTURE.ground_floor.rooms.includes(roomId)) floorId = 'ground_floor';
          else if (roomId && REQUIRED_STRUCTURE.roof.rooms.includes(roomId)) floorId = 'roof';
          else floorId = floorIdByName(refText) || 'ground_floor';
        }

        if (roomId === 'master_suite') {
          const child = detectRoomFromText(refText.replace('master suite', ''));
          if (MASTER_SUITE_CHILDREN.includes(child)) roomId = child;
        }

        return { roomId, floorId };
      }

      function formatState(entity) {
        const attrs = entity.attributes || {};
        const stateVal = entity.state;
        if (stateVal === 'unavailable') return t('unavailable');
        if (stateVal === 'unknown') return t('unknown');
        const domain = entity.entity_id.split('.')[0];

        if (domain === 'light') {
          const parts = [stateVal];
          if (attrs.brightness != null) parts.push(`${Math.round((attrs.brightness / 255) * 100)}%`);
          if (attrs.color_temp_kelvin) parts.push(`${attrs.color_temp_kelvin}K`);
          return parts.join(' • ');
        }
        if (domain === 'climate') {
          const c = attrs.current_temperature != null ? `${attrs.current_temperature}°` : '';
          const s = attrs.temperature != null ? `${attrs.temperature}°` : '';
          return [stateVal, c && `Now ${c}`, s && `Set ${s}`].filter(Boolean).join(' • ');
        }
        if (domain === 'sensor') {
          const u = attrs.unit_of_measurement ? ` ${attrs.unit_of_measurement}` : '';
          return `${stateVal}${u}`;
        }
        if (domain === 'cover') {
          const p = attrs.current_position != null ? `${attrs.current_position}%` : '';
          return [stateVal, p].filter(Boolean).join(' • ');
        }
        if (domain === 'media_player') {
          return [stateVal, attrs.source || attrs.app_name || ''].filter(Boolean).join(' • ');
        }
        if (domain === 'camera') return stateVal === 'recording' ? 'Recording' : stateVal;
        return stateVal;
      }

      function isOn(entity) {
        const st = entity.state;
        const d = entity.entity_id.split('.')[0];
        if (d === 'cover') return !['closed','closing'].includes(st);
        if (d === 'lock') return st === 'unlocked';
        if (d === 'alarm_control_panel') return !['disarmed','off'].includes(st);
        return ['on','open','playing','cool','heat','unlocked','arming','armed_away','armed_home','armed_night'].includes(st);
      }

      function computeData(hass) {
        const states = Object.values(hass.states || {});
        const entityRegById = new Map(state.registries.entities.map((e) => [e.entity_id, e]));
        const deviceById = new Map(state.registries.devices.map((d) => [d.id, d]));
        const areaMap = buildAreaMap();

        const floorMap = new Map(Object.keys(REQUIRED_STRUCTURE).map((fid) => [fid, { id: fid, rooms: new Map(), entities: [] }]));

        states.forEach((entity) => {
          const reg = entityRegById.get(entity.entity_id);
          if (isJunkEntity(entity, reg)) return;

          const { roomId, floorId } = roomAndFloorForEntity(entity, reg, areaMap, deviceById);
          if (!roomId || !floorMap.has(floorId)) return;

          const floor = floorMap.get(floorId);
          if (!floor.rooms.has(roomId)) floor.rooms.set(roomId, []);
          floor.rooms.get(roomId).push(entity);
          floor.entities.push(entity);
        });

        // master suite derived group
        const first = floorMap.get('first_floor');
        const suiteEntities = MASTER_SUITE_CHILDREN.flatMap((r) => first.rooms.get(r) || []);
        if (suiteEntities.length) first.rooms.set('master_suite', suiteEntities);

        const floors = [];
        floorMap.forEach((floor) => {
          const visibleRooms = Array.from(floor.rooms.entries()).filter(([, entities]) => entities.length);
          if (!visibleRooms.length) return;
          floors.push({
            ...floor,
            visibleRooms,
            counts: {
              rooms: visibleRooms.filter(([r]) => r !== 'master_suite' || suiteEntities.length).length,
              devices: floor.entities.length
            }
          });
        });

        const allEntities = floors.flatMap((f) => f.entities);
        const metrics = {
          floors: floors.length,
          rooms: floors.reduce((sum, f) => sum + f.visibleRooms.filter(([r]) => r !== 'master_suite').length, 0),
          devices: allEntities.length,
          online: allEntities.filter((e) => e.state !== 'unavailable').length,
          alerts: allEntities.filter((e) => ['problem','safety','smoke','gas','moisture'].includes(e.attributes.device_class) && ['on','detected','open'].includes(e.state)).length,
          active: allEntities.filter((e) => isOn(e)).length
        };

        state.cache = { floors, metrics };
      }

      function render() {
        document.body.dataset.mode = state.mode;
        document.body.dataset.family = state.family;
        document.body.classList.toggle('rtl', isRTL());
        document.documentElement.lang = state.lang;
        document.documentElement.dir = isRTL() ? 'rtl' : 'ltr';

        if (state.loading) {
          app.innerHTML = `<div class="topbar card">${topbarHTML()}</div><div class="loading">${safeText(t('loading'))}</div>`;
          wireTopbar();
          return;
        }

        let content = '';
        if (!state.cache.floors.length) {
          content = `<div class="empty">${safeText(t('noData'))}</div>`;
        } else if (state.route.page === 'home') {
          content = renderHome();
        } else if (state.route.page === 'floor') {
          content = renderFloor(state.route.floorId);
        } else if (state.route.page === 'suite') {
          content = renderSuite();
        } else {
          content = renderRoom(state.route.floorId, state.route.roomId);
        }

        const railEntities = getContextEntities();
        app.innerHTML = `<div class="topbar card">${topbarHTML()}</div>${renderIconRail(railEntities)}${content}<div class="footer-note">ALNAJDI SMART VILA</div>`;
        wireTopbar();
        wireActions();
      }

      function getContextEntities() {
        if (state.route.page === 'home') return state.cache.floors.flatMap((f) => f.entities);
        if (state.route.page === 'floor') return state.cache.floors.find((f) => f.id === state.route.floorId)?.entities || [];
        if (state.route.page === 'suite') {
          const floor = state.cache.floors.find((f) => f.id === 'first_floor');
          return MASTER_SUITE_CHILDREN.flatMap((r) => floor?.rooms?.get(r) || []);
        }
        const floor = state.cache.floors.find((f) => f.id === state.route.floorId);
        return floor?.rooms?.get(state.route.roomId) || [];
      }

      function renderIconRail(entities) {
        const counts = new Map(CATEGORY_CONFIG.map((c) => [c.key, 0]));
        const alerts = new Set();
        entities.forEach((e) => {
          const cat = classifyCategory(e);
          counts.set(cat.key, (counts.get(cat.key) || 0) + 1);
          if (['problem','safety','smoke','gas','moisture','door','window'].includes(e.attributes.device_class) && ['on','open','detected'].includes(e.state)) {
            alerts.add(cat.key);
          }
        });

        const items = CATEGORY_CONFIG
          .map((cfg) => ({ cfg, count: counts.get(cfg.key) || 0 }))
          .filter((x) => x.count > 0)
          .map(({ cfg, count }) => `<button class="rail-item ${count ? 'active' : ''} ${alerts.has(cfg.key) ? 'alert' : ''}" data-jump="${cfg.key}"><span class="ic">${cfg.icon}</span><span class="lb">${safeText(t(cfg.key))}</span><span class="ct">${count}</span></button>`)
          .join('');

        return `<nav class="icon-rail card">${items || `<div class="empty">${safeText(t('noData'))}</div>`}</nav>`;
      }

      function topbarHTML() {
        const canBack = state.route.page !== 'home';
        return `
          <div>${canBack ? `<button class="back-btn" data-act="back" aria-label="${safeText(t('back'))}">${isRTL() ? '→' : '←'}</button>` : ''}</div>
          <div class="title">ALNAJDI SMART VILA</div>
          <div style="display:flex;gap:6px;justify-content:${isRTL() ? 'start' : 'end'};flex-wrap:wrap;">
            <div class="seg" role="tablist">
              <button data-lang="en" class="${state.lang==='en'?'active':''}">${t('langEn')}</button>
              <button data-lang="ar" class="${state.lang==='ar'?'active':''}">${t('langAr')}</button>
            </div>
            <div class="seg" role="tablist">
              <button data-mode="day" class="${state.mode==='day'?'active':''}">${t('day')}</button>
              <button data-mode="night" class="${state.mode==='night'?'active':''}">${t('night')}</button>
            </div>
            <div class="seg" role="tablist">
              <button data-family="current" class="${state.family==='current'?'active':''}">${t('current')}</button>
              <button data-family="colors" class="${state.family==='colors'?'active':''}">${t('colors')}</button>
              <button data-family="glass" class="${state.family==='glass'?'active':''}">${t('glass')}</button>
            </div>
          </div>`;
      }

      function renderHome() {
        const m = state.cache.metrics;
        const floorCards = state.cache.floors.map((floor) => {
          const label = REQUIRED_STRUCTURE[floor.id]?.[state.lang] || floor.id;
          return `<article class="floor-card card" data-open-floor="${floor.id}">
            <div>
              <div class="card-title">${safeText(label)}</div>
              <div class="card-sub">${safeText(t('floorSummary'))}</div>
            </div>
            <div class="card-meta">
              <span>${safeText(t('rooms'))}: ${floor.counts.rooms}</span>
              <span>${safeText(t('devices'))}: ${floor.counts.devices}</span>
            </div>
          </article>`;
        }).join('');

        return `
          <section class="hero card">
            <div class="hero-main">
              <h1>${safeText(t('home'))}</h1>
              <p>${safeText(t('homeSub'))}</p>
              <div class="hero-meta">
                <div class="stat-chip"><b>${m.floors}</b><span>${safeText(t('floors'))}</span></div>
                <div class="stat-chip"><b>${m.rooms}</b><span>${safeText(t('rooms'))}</span></div>
                <div class="stat-chip"><b>${m.devices}</b><span>${safeText(t('devices'))}</span></div>
              </div>
            </div>
            <div class="hero-side">
              <div class="summary-card"><h4>${safeText(t('allOnline'))}</h4><p>${m.online}</p></div>
              <div class="summary-card"><h4>${safeText(t('favorites'))}</h4><p>${m.active}</p></div>
              <div class="summary-card"><h4>${safeText(t('alert'))}</h4><p>${m.alerts}</p></div>
              <div class="summary-card"><h4>${safeText(t('categories'))}</h4><p>${CATEGORY_CONFIG.length-1}</p></div>
            </div>
          </section>
          <section>
            <h3 class="section-title">${safeText(t('floors'))}</h3>
            <div class="floors-grid">${floorCards}</div>
          </section>`;
      }

      function renderFloor(floorId) {
        const floor = state.cache.floors.find((f) => f.id === floorId);
        if (!floor) return `<div class="empty">${safeText(t('noRooms'))}</div>`;
        const title = REQUIRED_STRUCTURE[floorId]?.[state.lang] || floorId;

        const roomCards = floor.visibleRooms
          .filter(([roomId]) => roomId !== 'master_suite')
          .map(([roomId, entities]) => {
            const isSuiteChild = MASTER_SUITE_CHILDREN.includes(roomId);
            const roomMeta = ROOMS[roomId] || { en: roomId, ar: roomId };
            const onclick = isSuiteChild ? `data-open-suite="1"` : `data-open-room="${roomId}"`;
            return `<article class="room-card card" ${onclick}>
              <div>
                <div class="card-title">${safeText(roomMeta[state.lang] || roomMeta.en)}</div>
                ${isSuiteChild ? `<div class="suite-badge">${safeText(t('suite'))}</div>` : ''}
              </div>
              <div class="card-meta"><span>${safeText(t('devices'))}: ${entities.length}</span><span>→</span></div>
            </article>`;
          }).join('');

        const showSuite = MASTER_SUITE_CHILDREN.some((r) => floor.visibleRooms.some(([id]) => id === r));

        return `
          <section class="hero card">
            <div class="hero-main">
              <h1>${safeText(title)}</h1>
              <p>${safeText(t('floorSummary'))}</p>
              <div class="hero-meta">
                <div class="stat-chip"><b>${floor.counts.rooms}</b><span>${safeText(t('rooms'))}</span></div>
                <div class="stat-chip"><b>${floor.counts.devices}</b><span>${safeText(t('entities'))}</span></div>
                <div class="stat-chip"><b>${floor.entities.filter(isOn).length}</b><span>${safeText(t('favorites'))}</span></div>
              </div>
            </div>
          </section>
          <section>
            <h3 class="section-title">${safeText(t('rooms'))}</h3>
            <div class="rooms-grid">
              ${showSuite ? `<article class="room-card card" data-open-suite="1"><div><div class="card-title">${safeText(t('suite'))}</div><div class="card-sub">${safeText(t('contains'))}: ${MASTER_SUITE_CHILDREN.map((r) => ROOMS[r][state.lang]).join(' • ')}</div></div><div class="card-meta"><span>${MASTER_SUITE_CHILDREN.reduce((sum, r) => sum + ((floor.rooms.get(r) || []).length), 0)} ${safeText(t('devices'))}</span><span>→</span></div></article>` : ''}
              ${roomCards || `<div class="empty">${safeText(t('noRooms'))}</div>`}
            </div>
          </section>`;
      }

      function renderSuite() {
        const floor = state.cache.floors.find((f) => f.id === 'first_floor');
        if (!floor) return `<div class="empty">${safeText(t('noRooms'))}</div>`;
        const cards = MASTER_SUITE_CHILDREN
          .filter((r) => (floor.rooms.get(r) || []).length > 0)
          .map((roomId) => `<article class="room-card card" data-open-room="${roomId}"><div class="card-title">${safeText(ROOMS[roomId][state.lang])}</div><div class="card-sub">${(floor.rooms.get(roomId) || []).length} ${safeText(t('devices'))}</div><div class="card-meta"><span>${safeText(t('roomSummary'))}</span><span>→</span></div></article>`)
          .join('');

        return `<section class="hero card"><div class="hero-main"><h1>${safeText(t('suite'))}</h1><p>${safeText(t('contains'))}: ${MASTER_SUITE_CHILDREN.map((r) => ROOMS[r][state.lang]).join(' • ')}</p></div></section><section><div class="rooms-grid">${cards || `<div class="empty">${safeText(t('noRooms'))}</div>`}</div></section>`;
      }

      function renderRoom(floorId, roomId) {
        const floor = state.cache.floors.find((f) => f.id === floorId);
        const roomEntities = floor?.rooms.get(roomId) || [];
        const roomTitle = ROOMS[roomId]?.[state.lang] || roomId;
        if (!roomEntities.length) return `<div class="empty">${safeText(t('noDevices'))}</div>`;

        const byCategory = new Map(CATEGORY_CONFIG.map((c) => [c.key, []]));
        roomEntities.forEach((entity) => {
          const cat = classifyCategory(entity);
          byCategory.get(cat.key).push(entity);
        });

        const sections = CATEGORY_CONFIG
          .map((cfg) => {
            const items = byCategory.get(cfg.key) || [];
            if (!items.length) return '';
            if (cfg.key === 'lighting') {
              const subgroupMap = new Map();
              items.forEach((light) => {
                const g = detectLightSubgroup(light);
                if (!subgroupMap.has(g)) subgroupMap.set(g, []);
                subgroupMap.get(g).push(light);
              });
              const subgroupHtml = Array.from(subgroupMap.entries())
                .map(([sg, sgItems]) => `<div class="subgroup"><h4>${safeText(t(sg))} (${sgItems.length})</h4><div class="device-grid">${sgItems.map((e) => deviceCard(e, cfg)).join('')}</div></div>`)
                .join('');
              return `<section class="device-section card" id="cat-${cfg.key}"><h3 class="section-title">${safeText(t(cfg.key))} <span style="font-size:11px;opacity:.8;">(${items.length})</span></h3><div class="subgroup-wrap">${subgroupHtml}</div></section>`;
            }
            return `<section class="device-section card" id="cat-${cfg.key}"><h3 class="section-title">${safeText(t(cfg.key))} <span style="font-size:11px;opacity:.8;">(${items.length})</span></h3><div class="device-grid">${items.map((e) => deviceCard(e, cfg)).join('')}</div></section>`;
          })
          .filter(Boolean)
          .join('');

        return `<section class="hero card"><div class="hero-main"><h1>${safeText(roomTitle)}</h1><p>${safeText(t('roomSummary'))}</p><div class="hero-meta"><div class="stat-chip"><b>${roomEntities.length}</b><span>${safeText(t('devices'))}</span></div><div class="stat-chip"><b>${roomEntities.filter((e) => e.state !== 'unavailable').length}</b><span>${safeText(t('allOnline'))}</span></div><div class="stat-chip"><b>${roomEntities.filter(isOn).length}</b><span>${safeText(t('favorites'))}</span></div></div></div></section><div class="devices-layout">${sections || `<div class="empty">${safeText(t('noDevices'))}</div>`}</div>`;
      }

      function deviceCard(entity, cat) {
        const attrs = entity.attributes || {};
        const name = attrs.friendly_name || entity.entity_id;
        const on = isOn(entity);
        const grad = on ? cat.gradOn : cat.gradOff;
        const domain = entity.entity_id.split('.')[0];
        const extra = controlTail(entity, domain);
        const brightness = domain === 'light' && attrs.brightness != null ? Math.round((attrs.brightness / 255) * 100) : null;
        const power = attrs.power != null ? `${attrs.power} W` : (attrs.current_power_w != null ? `${attrs.current_power_w} W` : '');
        const meta = [brightness != null ? `${brightness}%` : '', attrs.color_temp_kelvin ? `${attrs.color_temp_kelvin}K` : '', power].filter(Boolean).join(' • ');
        return `<article class="device-card" data-eid="${entity.entity_id}" style="--device-grad:${grad}">
          <div class="device-icon-wrap"><span class="device-icon">${cat.icon}</span></div>
          <div class="device-main">
            <div class="device-name">${safeText(name)}</div>
            <div class="device-state">${safeText(formatState(entity))}</div>
            ${meta ? `<div class="device-meta-line">${safeText(meta)}</div>` : ''}
            ${brightness != null ? `<input class="dimmer" data-dimmer="${entity.entity_id}" type="range" min="1" max="100" value="${brightness}" />` : ''}
          </div>
          <div class="device-tail">${extra}</div>
        </article>`;
      }

      function controlTail(entity, domain) {
        if (domain === 'cover') {
          return `<button class="tiny" data-cover="open" data-eid="${entity.entity_id}">↑</button><button class="tiny" data-cover="stop" data-eid="${entity.entity_id}">■</button><button class="tiny" data-cover="close" data-eid="${entity.entity_id}">↓</button>`;
        }
        if (domain === 'lock') {
          const unlock = entity.state === 'locked';
          return `<button class="tiny" data-lock="${unlock ? 'unlock' : 'lock'}" data-eid="${entity.entity_id}">${unlock ? '🔓' : '🔒'}</button>`;
        }
        if (domain === 'climate') {
          return `<button class="tiny" data-climate="details" data-eid="${entity.entity_id}">⋯</button>`;
        }
        if (domain === 'media_player') {
          return `<button class="tiny" data-media="toggle" data-eid="${entity.entity_id}">▶</button>`;
        }
        return '';
      }

      async function callService(domain, service, data) {
        const hass = getHass();
        if (!hass) return;
        try { await hass.callService(domain, service, data); } catch (_) {}
      }

      function openClimateModal(entityId) {
        const hass = getHass();
        const ent = hass?.states?.[entityId];
        if (!ent) return;
        const attrs = ent.attributes || {};
        const hvacModes = attrs.hvac_modes || [];
        const cur = attrs.temperature;

        modal.innerHTML = `<div class="modal-panel"><h3 style="margin:0;">${safeText(attrs.friendly_name || entityId)}</h3><p style="margin:6px 0 0;color:var(--muted);">${safeText(formatState(ent))}</p><div class="modal-row">${hvacModes.map((m) => `<button class="btn ${ent.state===m?'active':''}" data-hvac="${m}" data-eid="${entityId}">${safeText(m)}</button>`).join('')}</div><div class="modal-row"><button class="btn" data-temp="down" data-eid="${entityId}" data-cur="${cur ?? ''}">-1°</button><button class="btn" data-temp="up" data-eid="${entityId}" data-cur="${cur ?? ''}">+1°</button><button class="btn" data-modal-close="1">Close</button></div></div>`;
        modal.classList.add('show');
      }

      function wireTopbar() {
        app.querySelectorAll('[data-lang]').forEach((el) => el.onclick = () => {
          state.lang = el.dataset.lang;
          localStorage.setItem('villa.lang', state.lang);
          render();
        });
        app.querySelectorAll('[data-mode]').forEach((el) => el.onclick = () => {
          state.mode = el.dataset.mode;
          localStorage.setItem('villa.mode', state.mode);
          render();
        });
        app.querySelectorAll('[data-family]').forEach((el) => el.onclick = () => {
          state.family = el.dataset.family;
          localStorage.setItem('villa.family', state.family);
          render();
        });
        const b = app.querySelector('[data-act="back"]');
        if (b) b.onclick = () => {
          if (state.route.page === 'room' && MASTER_SUITE_CHILDREN.includes(state.route.roomId)) {
            state.route = { page: 'suite', floorId: 'first_floor', roomId: null };
          } else if (state.route.page === 'room') {
            state.route = { page: 'floor', floorId: state.route.floorId, roomId: null };
          } else if (state.route.page === 'suite') {
            state.route = { page: 'floor', floorId: 'first_floor', roomId: null };
          } else {
            state.route = { page: 'home', floorId: null, roomId: null };
          }
          render();
        };
      }

      function wireActions() {
        app.querySelectorAll('[data-open-floor]').forEach((el) => el.onclick = () => {
          state.route = { page: 'floor', floorId: el.dataset.openFloor, roomId: null };
          render();
        });

        app.querySelectorAll('[data-open-room]').forEach((el) => el.onclick = () => {
          state.route = { page: 'room', floorId: state.route.floorId || 'first_floor', roomId: el.dataset.openRoom };
          render();
        });

        app.querySelectorAll('[data-open-suite]').forEach((el) => el.onclick = () => {
          state.route = { page: 'suite', floorId: 'first_floor', roomId: null };
          render();
        });

        app.querySelectorAll('[data-jump]').forEach((el) => el.onclick = () => {
          const id = `cat-${el.dataset.jump}`;
          const target = app.querySelector(`#${CSS.escape(id)}`);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });

        app.querySelectorAll('.device-card[data-eid]').forEach((el) => {
          const eid = el.dataset.eid;
          const domain = eid.split('.')[0];
          el.onclick = (ev) => {
            if (ev.target.closest('.tiny')) return;
            if (domain === 'light' || domain === 'switch' || domain === 'fan' || domain === 'input_boolean') {
              callService(domain, 'toggle', { entity_id: eid });
            } else if (domain === 'scene') {
              callService('scene', 'turn_on', { entity_id: eid });
            } else if (domain === 'button' || domain === 'input_button') {
              callService(domain, 'press', { entity_id: eid });
            } else if (domain === 'camera' || domain === 'climate' || domain === 'media_player' || domain === 'alarm_control_panel') {
              fireMoreInfo(eid);
            }
          };
        });

        app.querySelectorAll('[data-cover]').forEach((btn) => btn.onclick = (e) => {
          e.stopPropagation();
          const service = { open: 'open_cover', close: 'close_cover', stop: 'stop_cover' }[btn.dataset.cover];
          callService('cover', service, { entity_id: btn.dataset.eid });
        });

        app.querySelectorAll('[data-lock]').forEach((btn) => btn.onclick = (e) => {
          e.stopPropagation();
          callService('lock', btn.dataset.lock, { entity_id: btn.dataset.eid });
        });

        app.querySelectorAll('[data-climate="details"]').forEach((btn) => btn.onclick = (e) => {
          e.stopPropagation();
          openClimateModal(btn.dataset.eid);
        });

        app.querySelectorAll('[data-dimmer]').forEach((input) => input.onchange = (e) => {
          e.stopPropagation();
          callService('light', 'turn_on', { entity_id: input.dataset.dimmer, brightness_pct: Number(input.value) });
        });

        app.querySelectorAll('[data-media="toggle"]').forEach((btn) => btn.onclick = (e) => {
          e.stopPropagation();
          callService('media_player', 'media_play_pause', { entity_id: btn.dataset.eid });
        });
      }

      function wireModal() {
        modal.onclick = (e) => {
          if (e.target === modal || e.target.dataset.modalClose) {
            modal.classList.remove('show');
            modal.innerHTML = '';
            return;
          }

          const hvac = e.target.dataset.hvac;
          if (hvac) callService('climate', 'set_hvac_mode', { entity_id: e.target.dataset.eid, hvac_mode: hvac });

          const temp = e.target.dataset.temp;
          if (temp) {
            const cur = Number(e.target.dataset.cur);
            if (!Number.isFinite(cur)) return;
            callService('climate', 'set_temperature', { entity_id: e.target.dataset.eid, temperature: temp === 'up' ? cur + 1 : cur - 1 });
          }
        };
      }

      function fireMoreInfo(entityId) {
        try {
          const event = new Event('hass-more-info', { bubbles: true, composed: true });
          event.detail = { entityId };
          const root = window.parent?.document?.querySelector('home-assistant');
          root?.dispatchEvent(event);
        } catch (_) {}
      }

      async function refresh() {
        const hass = getHass();
        if (!hass) {
          state.loading = true;
          render();
          return;
        }

        if (!state.registries.entities.length) await fetchRegistries(hass);

        const keys = Object.keys(hass.states || {});
        const hash = `${keys.length}:${keys.slice(0,4).join('|')}:${keys.map((k) => hass.states[k]?.last_changed || '').slice(0,8).join('|')}`;
        if (hash !== state.lastStateHash || state.loading) {
          state.lastStateHash = hash;
          computeData(hass);
          state.loading = false;
          if (state.route.page === 'floor' && !state.cache.floors.some((f) => f.id === state.route.floorId)) state.route = { page: 'home', floorId: null, roomId: null };
          if (state.route.page === 'room') {
            const floor = state.cache.floors.find((f) => f.id === state.route.floorId);
            if (!floor?.rooms?.get(state.route.roomId)?.length) state.route = { page: 'floor', floorId: state.route.floorId, roomId: null };
          }
          render();
        }
      }

      wireModal();
      render();
      refresh();
      setInterval(refresh, 3500);
    })();
  </script>
</body>
</html>
