<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALNAJDI SMART VILA</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap');
    :root{
      --bg:#0b0e14;--card:#121722;--card2:#171d2a;--line:rgba(255,255,255,.09);--txt:#f4f7ff;--muted:#95a2bd;
      --accent:#9ad1ff;--gold:#d1b167;--ok:#39d98a;--warn:#fcbf49;--danger:#ff5f6d;
      --blur:0px;
    }
    [data-theme='light']{--bg:#eef2fb;--card:#ffffff;--card2:#f8fbff;--line:rgba(19,33,68,.12);--txt:#0f1c36;--muted:#5f6f8d;--accent:#0f7fff;--gold:#9f7a2f;--blur:0px;}
    [data-theme='glass']{--bg:radial-gradient(1200px 900px at 8% -10%,#26384f 0%,#0b0e14 38%),radial-gradient(1000px 800px at 100% 0,#1f273f 0%,#0b0e14 42%);--card:rgba(23,30,45,.48);--card2:rgba(25,33,49,.6);--line:rgba(255,255,255,.14);--txt:#f8fbff;--muted:#b7c4db;--accent:#99d0ff;--gold:#dcc187;--blur:14px;}
    *{box-sizing:border-box} html,body{height:100%}
    body{margin:0;background:var(--bg);color:var(--txt);font-family:Inter,Tajawal,sans-serif;overflow:hidden}
    body.rtl{font-family:Tajawal,Inter,sans-serif}
    .app{height:100%;overflow:auto;padding:16px 14px 32px;max-width:1400px;margin:auto}
    .card{background:var(--card);border:1px solid var(--line);border-radius:20px;backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));box-shadow:0 12px 40px rgba(0,0,0,.22)}
    .header{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;padding:10px 12px;position:sticky;top:0;z-index:20;background:linear-gradient(to bottom,rgba(0,0,0,.25),transparent)}
    .title{font-weight:900;letter-spacing:.2em;text-align:center;color:var(--gold);font-size:clamp(15px,2.3vw,22px)}
    .ctrls{display:flex;gap:8px;align-items:center}
    .pill{display:flex;background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:4px;gap:4px}
    .pill button{border:0;background:transparent;color:var(--muted);padding:7px 10px;border-radius:999px;font-weight:700;cursor:pointer}
    .pill button.on{background:rgba(131,176,255,.17);color:var(--txt)}

    .hero{display:grid;grid-template-columns:1.15fr .85fr;gap:12px;margin-top:8px}
    .weather,.clock{padding:18px;position:relative;overflow:hidden}
    .orb{position:absolute;inset:auto -30px -36px auto;width:140px;height:140px;border-radius:50%;filter:blur(1px);opacity:.35;background:radial-gradient(circle at 30% 30%,#ffe08f,#f8a03e)}
    .moon{background:radial-gradient(circle at 35% 30%,#edf4ff,#a5b9e2)}
    .clock-time{font-size:clamp(34px,5.7vw,58px);font-weight:900;line-height:1}
    .small{font-size:12px;color:var(--muted)}
    .temp{font-size:40px;font-weight:900;line-height:1}
    .strip{display:grid;grid-template-columns:repeat(8,minmax(86px,1fr));gap:8px;margin-top:12px}
    .cat{padding:10px 8px;text-align:center;position:relative;cursor:pointer;transition:.22s transform}
    .cat:hover{transform:translateY(-2px)}
    .cat.alert{border-color:rgba(255,95,109,.6);box-shadow:0 0 0 1px rgba(255,95,109,.3) inset,0 0 20px rgba(255,95,109,.17)}
    .icon{font-size:22px;display:block;margin-bottom:6px}
    .badge{position:absolute;top:6px;left:6px;background:var(--accent);color:#061126;border-radius:999px;min-width:21px;padding:2px 6px;font-size:11px;font-weight:800}

    .floors{margin-top:14px;display:flex;flex-direction:column;gap:12px}
    .floor{padding:12px}
    .floor.inactive{opacity:.52}
    .floor-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .floor-title{font-size:18px;font-weight:800}
    .rooms{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px}
    .room{background:var(--card2);border:1px solid var(--line);border-radius:16px;overflow:hidden}
    .room.hidden{display:none}
    .room-head{padding:11px 12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
    .room-name{font-weight:800}
    .room-meta{font-size:12px;color:var(--muted)}
    .room-body{max-height:0;overflow:hidden;transition:max-height .35s ease;padding:0 10px}
    .room.open .room-body{max-height:550px;padding:0 10px 10px}
    .chips{display:flex;gap:6px;flex-wrap:wrap}
    .chip{padding:6px 10px;border-radius:999px;font-size:12px;background:rgba(155,190,255,.12);border:1px solid var(--line)}
    .suite{border:1px solid rgba(209,177,103,.45);background:linear-gradient(145deg,rgba(209,177,103,.12),transparent 44%),var(--card2)}
    .subrooms{display:grid;gap:8px}
    .subroom{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;padding:9px}
    .muted{color:var(--muted)}

    @media (max-width:980px){.strip{grid-template-columns:repeat(4,1fr)}.hero{grid-template-columns:1fr}}
    @media (max-width:640px){.header{grid-template-columns:auto 1fr;grid-template-areas:'l c' 'r r';}.header .left{grid-area:l}.header .title{grid-area:c;text-align:end}.header .right{grid-area:r;justify-content:flex-end}.strip{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body data-theme="dark">
  <div class="app">
    <header class="header">
      <div class="ctrls left">
        <div class="pill" id="langPill">
          <button data-lang="en" class="on">EN</button>
          <button data-lang="ar">عربي</button>
        </div>
      </div>
      <div class="title">ALNAJDI SMART VILA</div>
      <div class="ctrls right" style="justify-content:flex-end">
        <div class="pill" id="themePill">
          <button data-theme="light">Light</button>
          <button data-theme="dark" class="on">Dark</button>
          <button data-theme="glass">Glass</button>
        </div>
      </div>
    </header>

    <section class="hero">
      <article class="card weather">
        <div class="orb" id="orb"></div>
        <div class="small" id="weatherLabel">Weather</div>
        <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:8px;margin-top:6px">
          <div>
            <div class="temp" id="temp">--°</div>
            <div id="condition" class="muted">Home Assistant source</div>
          </div>
          <div style="text-align:end">
            <div id="humidity" class="small">Humidity --%</div>
            <div id="wind" class="small">Wind --</div>
          </div>
        </div>
      </article>
      <article class="card clock">
        <div class="clock-time" id="time">00:00</div>
        <div class="small" id="date">--</div>
        <div class="small" id="haState" style="margin-top:8px">HA: connecting...</div>
      </article>
    </section>

    <section class="strip" id="categoryStrip"></section>

    <section class="floors" id="floors"></section>
  </div>

<script>
const I18N={
  en:{weather:'Weather',haOk:'HA: connected',haFail:'HA: using fallback data',devices:'devices',inactive:'inactive',empty:'No active entities',masterSuite:'Master Suite',cove:'Cove Lights'},
  ar:{weather:'الطقس',haOk:'متصل بـ Home Assistant',haFail:'وضع احتياطي',devices:'جهاز',inactive:'غير نشط',empty:'لا توجد كيانات نشطة',masterSuite:'الجناح الرئيسي',cove:'إضاءة مخفية'}
};
const HOUSE={
  floors:[
    {id:'ground',en:'Ground Floor',ar:'الدور الأرضي',rooms:['Back Doorway','Sitting Room','Prep Kitchen','Father Room']},
    {id:'first',en:'First Floor',ar:'الدور الأول',rooms:['Office','Sitting Room','Living Room','Second Room']},
    {id:'second',en:'Second Floor',ar:'الدور الثاني',rooms:[]},
    {id:'roof',en:'Roof',ar:'السطح',rooms:['Roof']}
  ],
  suite:{en:'Master Suite',ar:'الجناح الرئيسي',children:['Master Bedroom','Master Bathroom','Master Closet Room']}
};
let lang='en',states=[];
const q=(s,p=document)=>p.querySelector(s), qa=(s,p=document)=>[...p.querySelectorAll(s)];

function areaLike(entity,name){const x=(entity.attributes.friendly_name+' '+entity.entity_id).toLowerCase();return name.toLowerCase().split(' ').every(t=>x.includes(t.toLowerCase().replace('_',' ')));}
function isOn(e){return !['off','unavailable','unknown','idle','closed','disarmed','standby'].includes((e.state||'').toLowerCase());}
function domain(e){return e.entity_id.split('.')[0];}
function getRoomEntities(room){
  return states.filter(e=>areaLike(e,room));
}

function renderCategories(){
  const defs=[['lights','💡',e=>domain(e)==='light'],['climate','❄️',e=>domain(e)==='climate'],['security','🛡️',e=>domain(e)==='alarm_control_panel'||domain(e)==='lock'],['cameras','📹',e=>domain(e)==='camera'],['media','🎵',e=>domain(e)==='media_player'],['doors','🚪',e=>domain(e)==='binary_sensor'&&/door|window/.test(e.entity_id)],['curtains','🪟',e=>domain(e)==='cover'],['leaks','💧',e=>domain(e)==='binary_sensor'&&/moisture|water|leak/.test(e.entity_id)]];
  const c=q('#categoryStrip'); c.innerHTML='';
  defs.forEach(([key,emoji,fn])=>{
    const group=states.filter(fn),active=group.filter(isOn).length;
    const el=document.createElement('article');
    el.className='card cat '+((key==='leaks'&&active>0)?'alert':'');
    el.innerHTML=`<span class='badge'>${active}</span><span class='icon'>${emoji}</span><div>${key}</div><div class='small'>${group.length} ${I18N[lang].devices}</div>`;
    c.appendChild(el);
  });
}

function makeRoom(room,enclosed=false){
  const ents=getRoomEntities(room);
  const on=ents.filter(isOn).length;
  const r=document.createElement('article'); r.className='room'+(ents.length? '':' hidden');
  r.innerHTML=`<div class='room-head'><div><div class='room-name'>${room}</div><div class='room-meta'>${on}/${ents.length} ${I18N[lang].devices}</div></div><div>▾</div></div><div class='room-body'><div class='chips'>${ents.slice(0,14).map(e=>`<span class='chip'>${e.attributes.friendly_name||e.entity_id}</span>`).join('')||`<span class='muted'>${I18N[lang].empty}</span>`}</div>${enclosed?`<div class='small muted' style='margin-top:8px'>${I18N[lang].cove}: ${ents.filter(e=>/cove/i.test(e.entity_id+JSON.stringify(e.attributes))).length}</div>`:''}</div>`;
  q('.room-head',r).onclick=()=>r.classList.toggle('open');
  return r;
}

function renderFloors(){
  const root=q('#floors'); root.innerHTML='';
  HOUSE.floors.forEach(f=>{
    const floor=document.createElement('section'); floor.className='card floor';
    const title=lang==='ar'?f.ar:f.en;
    const allRooms=[...f.rooms];
    if(f.id==='first') allRooms.unshift(HOUSE.suite.en);
    let active=0;
    const roomWrap=document.createElement('div'); roomWrap.className='rooms';

    if(f.id==='first'){
      const suite=document.createElement('article'); suite.className='room suite';
      const suiteEnts=HOUSE.suite.children.flatMap(getRoomEntities); active+=suiteEnts.length;
      suite.innerHTML=`<div class='room-head'><div><div class='room-name'>${lang==='ar'?HOUSE.suite.ar:HOUSE.suite.en}</div><div class='room-meta'>${suiteEnts.filter(isOn).length}/${suiteEnts.length} ${I18N[lang].devices}</div></div><div>▾</div></div><div class='room-body'><div class='subrooms'></div></div>`;
      const sub=q('.subrooms',suite);
      HOUSE.suite.children.forEach(name=>{
        const card=makeRoom(name,/Master (Bedroom|Bathroom)/.test(name));
        card.classList.remove('room'); card.classList.add('subroom'); card.classList.remove('hidden');
        sub.appendChild(card);
      });
      q('.room-head',suite).onclick=()=>suite.classList.toggle('open');
      roomWrap.appendChild(suite);
    }

    f.rooms.forEach(rn=>{const room=makeRoom(rn);active+=getRoomEntities(rn).length;roomWrap.appendChild(room);});
    if(f.id==='second' && active===0) floor.classList.add('inactive');
    if(f.id==='second' && active===0){
      roomWrap.innerHTML=`<div class='muted'>${title}: ${I18N[lang].inactive}</div>`;
    }
    if(f.id!=='second' && active===0) return;

    floor.innerHTML=`<div class='floor-head'><div class='floor-title'>${title}</div><div class='small'>${active} ${I18N[lang].devices}</div></div>`;
    floor.appendChild(roomWrap); root.appendChild(floor);
  });
}

function updateClock(){
  const now=new Date();
  q('#time').textContent=now.toLocaleTimeString(lang==='ar'?'ar-KW':'en-US',{hour:'2-digit',minute:'2-digit'});
  q('#date').textContent=now.toLocaleDateString(lang==='ar'?'ar-KW':'en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}

function applyLang(){
  document.documentElement.lang=lang; document.documentElement.dir=lang==='ar'?'rtl':'ltr';
  document.body.classList.toggle('rtl',lang==='ar');
  q('#weatherLabel').textContent=I18N[lang].weather;
  qa('#langPill button').forEach(b=>b.classList.toggle('on',b.dataset.lang===lang));
  renderCategories();renderFloors();updateClock();
}

async function loadHA(){
  try{
    const r=await fetch('/api/states');
    if(!r.ok) throw new Error('states fail');
    states=await r.json();
    q('#haState').textContent=I18N[lang].haOk;
    bindWeather(); renderCategories(); renderFloors();
  }catch(e){
    states=[]; q('#haState').textContent=I18N[lang].haFail;
    q('#temp').textContent='--°'; q('#condition').textContent='No weather entity';
    renderCategories(); renderFloors();
  }
}

function bindWeather(){
  const w=states.find(e=>domain(e)==='weather')||null;
  if(!w){q('#condition').textContent='No weather entity';return;}
  const a=w.attributes;
  q('#condition').textContent=(a.friendly_name||w.state)+' · '+w.state;
  q('#temp').textContent=`${Math.round(a.temperature ?? 0)}°`;
  q('#humidity').textContent=`Humidity ${a.humidity ?? '--'}%`;
  q('#wind').textContent=`Wind ${a.wind_speed ?? '--'}`;
  const hour=(new Date()).getHours(),night=hour<6||hour>17;
  q('#orb').classList.toggle('moon',night);
}

qa('#themePill button').forEach(b=>b.onclick=()=>{document.body.dataset.theme=b.dataset.theme;qa('#themePill button').forEach(x=>x.classList.remove('on'));b.classList.add('on');});
qa('#langPill button').forEach(b=>b.onclick=()=>{lang=b.dataset.lang;applyLang();});

setInterval(updateClock,1000); updateClock(); applyLang(); loadHA(); setInterval(loadHA,30000);
</script>
</body>
</html>
