<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALNAJDI SMART VILA</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap');

    :root {
      color-scheme: dark;
      --bg: #0a101a;
      --bg-gradient: radial-gradient(1300px 800px at 12% -10%, rgba(64, 112, 191, 0.24) 0%, transparent 52%), radial-gradient(1200px 900px at 100% -10%, rgba(72, 120, 209, 0.2) 0%, transparent 50%), #0a101a;
      --surface: rgba(16, 24, 36, 0.88);
      --surface-2: rgba(23, 33, 48, 0.9);
      --surface-3: rgba(37, 51, 74, 0.62);
      --line: rgba(197, 220, 255, 0.14);
      --line-strong: rgba(157, 202, 255, 0.35);
      --txt: #f3f7ff;
      --muted: #a0b0ce;
      --gold: #d6bb83;
      --blue: #75bbff;
      --good: #4adeaa;
      --danger: #ff6f7e;
      --chip-glow: rgba(120, 182, 255, 0.28);
      --hero-sun: radial-gradient(circle at 36% 30%, rgba(255,235,172,0.9), rgba(247,157,76,0.42));
      --hero-moon: radial-gradient(circle at 35% 30%, rgba(168,203,255,0.85), rgba(107,136,216,0.36));
      --shadow: 0 20px 45px rgba(0, 0, 0, 0.34);
      --blur: 16px;
      --room-open-bg: rgba(255, 255, 255, 0.04);
      --active-gradient: linear-gradient(140deg, rgba(117, 187, 255, 0.35), rgba(98, 165, 255, 0.1));
      --suite-accent: rgba(214, 187, 131, 0.42);
      --body-noise: 0.03;
    }

    body[data-family='current'][data-mode='day'] {
      color-scheme: light;
      --bg: #eef4ff;
      --bg-gradient: radial-gradient(1000px 560px at 10% -10%, rgba(125, 177, 255, 0.34) 0%, transparent 58%), radial-gradient(1000px 560px at 100% 0%, rgba(122, 168, 245, 0.2) 0%, transparent 58%), #eef4ff;
      --surface: rgba(255, 255, 255, 0.95);
      --surface-2: rgba(251, 254, 255, 0.94);
      --surface-3: rgba(235, 245, 255, 0.92);
      --line: rgba(22, 49, 95, 0.14);
      --line-strong: rgba(31, 102, 209, 0.35);
      --txt: #14213c;
      --muted: #607192;
      --gold: #876722;
      --blue: #1d78ef;
      --good: #15a975;
      --danger: #db4359;
      --chip-glow: rgba(40, 113, 232, 0.24);
      --shadow: 0 12px 28px rgba(36, 77, 142, 0.16);
      --blur: 0px;
      --room-open-bg: rgba(28, 72, 147, 0.04);
      --active-gradient: linear-gradient(140deg, rgba(48, 128, 252, 0.2), rgba(48, 128, 252, 0.08));
      --suite-accent: rgba(155, 115, 24, 0.42);
    }

    body[data-family='anashost'][data-mode='night'] {
      --bg: #070d16;
      --bg-gradient: radial-gradient(1250px 850px at -10% -15%, rgba(28, 97, 196, 0.44) 0%, transparent 50%), radial-gradient(900px 600px at 115% -10%, rgba(208, 167, 80, 0.2) 0%, transparent 55%), linear-gradient(130deg, #070d16 0%, #0c1628 60%, #0a1220 100%);
      --surface: rgba(12, 23, 42, 0.84);
      --surface-2: rgba(17, 31, 56, 0.88);
      --surface-3: rgba(31, 48, 78, 0.66);
      --line: rgba(201, 230, 255, 0.18);
      --line-strong: rgba(219, 178, 89, 0.42);
      --txt: #f2f8ff;
      --muted: #a9bddf;
      --gold: #dcb978;
      --blue: #75bbff;
      --good: #51dba8;
      --danger: #ff7a88;
      --chip-glow: rgba(219, 178, 89, 0.24);
      --shadow: 0 22px 52px rgba(2, 8, 21, 0.46);
      --blur: 12px;
      --room-open-bg: rgba(255, 224, 153, 0.06);
      --active-gradient: linear-gradient(145deg, rgba(220, 185, 120, 0.27), rgba(104, 177, 255, 0.11));
      --suite-accent: rgba(220, 185, 120, 0.58);
      --hero-sun: radial-gradient(circle at 32% 28%, rgba(255, 225, 163, 0.95), rgba(210, 149, 69, 0.52));
      --hero-moon: radial-gradient(circle at 36% 24%, rgba(127, 193, 255, 0.95), rgba(87, 126, 231, 0.42));
    }

    body[data-family='anashost'][data-mode='day'] {
      color-scheme: light;
      --bg: #f4f8ff;
      --bg-gradient: radial-gradient(1200px 670px at -6% -15%, rgba(56, 124, 224, 0.34) 0%, transparent 54%), radial-gradient(1000px 580px at 120% 0%, rgba(225, 184, 108, 0.26) 0%, transparent 56%), #f4f8ff;
      --surface: rgba(255, 255, 255, 0.93);
      --surface-2: rgba(250, 253, 255, 0.95);
      --surface-3: rgba(232, 241, 255, 0.9);
      --line: rgba(16, 55, 114, 0.16);
      --line-strong: rgba(181, 126, 27, 0.42);
      --txt: #162341;
      --muted: #5f6f92;
      --gold: #9b6f16;
      --blue: #1f7ff2;
      --good: #129f72;
      --danger: #d63f56;
      --chip-glow: rgba(173, 124, 41, 0.22);
      --shadow: 0 12px 30px rgba(28, 73, 148, 0.16);
      --blur: 2px;
      --room-open-bg: rgba(217, 175, 87, 0.08);
      --active-gradient: linear-gradient(140deg, rgba(223, 180, 106, 0.25), rgba(42, 128, 243, 0.1));
      --suite-accent: rgba(170, 123, 30, 0.52);
    }

    body[data-family='glass'][data-mode='night'] {
      --bg: #04070c;
      --bg-gradient: radial-gradient(1100px 720px at 0% -20%, rgba(125, 188, 255, 0.4) 0%, transparent 44%), radial-gradient(1200px 900px at 100% -20%, rgba(109, 147, 235, 0.3) 0%, transparent 48%), radial-gradient(900px 600px at 50% 120%, rgba(66, 107, 198, 0.2) 0%, transparent 60%), #04070c;
      --surface: linear-gradient(155deg, rgba(255,255,255,0.18), rgba(255,255,255,0.03));
      --surface-2: linear-gradient(155deg, rgba(255,255,255,0.2), rgba(255,255,255,0.04));
      --surface-3: rgba(176, 208, 255, 0.16);
      --line: rgba(220, 236, 255, 0.27);
      --line-strong: rgba(190, 220, 255, 0.56);
      --txt: #f5f9ff;
      --muted: #c7d6f0;
      --gold: #e1c386;
      --blue: #98ccff;
      --good: #5de8b5;
      --danger: #ff8492;
      --chip-glow: rgba(153, 208, 255, 0.34);
      --shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
      --blur: 24px;
      --room-open-bg: rgba(198, 226, 255, 0.09);
      --active-gradient: linear-gradient(145deg, rgba(171, 220, 255, 0.35), rgba(145, 173, 255, 0.11));
      --suite-accent: rgba(223, 195, 134, 0.64);
      --hero-sun: radial-gradient(circle at 32% 28%, rgba(255, 238, 197, 0.96), rgba(242, 164, 91, 0.52));
      --hero-moon: radial-gradient(circle at 35% 30%, rgba(188, 221, 255, 0.92), rgba(120, 150, 237, 0.44));
      --body-noise: 0.08;
    }

    body[data-family='glass'][data-mode='day'] {
      color-scheme: light;
      --bg: #edf6ff;
      --bg-gradient: radial-gradient(1100px 720px at 0% -20%, rgba(128, 194, 255, 0.52) 0%, transparent 45%), radial-gradient(1200px 850px at 100% -20%, rgba(169, 199, 255, 0.44) 0%, transparent 50%), #edf6ff;
      --surface: linear-gradient(155deg, rgba(255,255,255,0.8), rgba(255,255,255,0.5));
      --surface-2: linear-gradient(155deg, rgba(255,255,255,0.86), rgba(255,255,255,0.52));
      --surface-3: rgba(255, 255, 255, 0.66);
      --line: rgba(95, 139, 220, 0.24);
      --line-strong: rgba(75, 120, 209, 0.48);
      --txt: #11233f;
      --muted: #5d7197;
      --gold: #91661f;
      --blue: #287ee8;
      --good: #11996c;
      --danger: #d84258;
      --chip-glow: rgba(74, 128, 220, 0.24);
      --shadow: 0 16px 34px rgba(57, 95, 161, 0.2);
      --blur: 14px;
      --room-open-bg: rgba(124, 173, 244, 0.11);
      --active-gradient: linear-gradient(145deg, rgba(142, 199, 255, 0.38), rgba(123, 145, 234, 0.12));
      --suite-accent: rgba(161, 117, 32, 0.56);
      --body-noise: 0.06;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      background: var(--bg-gradient);
      color: var(--txt);
      font-family: Inter, Tajawal, sans-serif;
      overflow: hidden;
      transition: background 250ms ease, color 220ms ease;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(120deg, rgba(255,255,255,var(--body-noise)) 0 1px, transparent 1px 5px);
      mix-blend-mode: soft-light;
      opacity: 0.25;
      z-index: 0;
    }

    body.rtl { font-family: Tajawal, Inter, sans-serif; }

    .app {
      position: relative;
      z-index: 1;
      max-width: 1540px;
      margin: auto;
      height: 100%;
      padding: 18px 16px 32px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .premium-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(var(--blur)) saturate(138%);
      -webkit-backdrop-filter: blur(var(--blur)) saturate(138%);
      transition: border-color 200ms ease, box-shadow 200ms ease, transform 180ms ease;
      position: relative;
      overflow: hidden;
    }

    body[data-family='glass'] .premium-card::before {
      content: '';
      position: absolute;
      inset: 1px;
      border-radius: 22px;
      pointer-events: none;
      background: linear-gradient(145deg, rgba(255,255,255,0.32), rgba(255,255,255,0.02) 35%, rgba(130,175,255,0.07) 75%, rgba(255,255,255,0.1));
      opacity: 0.75;
    }

    .header {
      padding: 9px 12px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 40;
      background: linear-gradient(to bottom, rgba(6,10,16,0.55), transparent);
    }

    .villa-title {
      text-align: center;
      font-size: clamp(14px, 2.15vw, 24px);
      font-weight: 900;
      letter-spacing: 0.28em;
      color: var(--gold);
      text-shadow: 0 0 16px rgba(212, 185, 127, 0.28);
      white-space: nowrap;
    }

    .micro-group { display: flex; align-items: center; gap: 8px; }
    .header .right { justify-content: flex-end; }

    .seg {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
    }

    .seg button {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: 180ms ease;
      min-width: 52px;
      white-space: nowrap;
    }

    .seg button.on {
      background: var(--active-gradient);
      color: var(--txt);
      box-shadow: inset 0 0 0 1px var(--line-strong), 0 4px 12px var(--chip-glow);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 12px;
    }

    .weather-card, .clock-card { padding: 20px; position: relative; overflow: hidden; }

    .weather-card::after,
    .clock-card::after {
      content: '';
      position: absolute;
      inset: auto -24px -42px auto;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.54;
      background: var(--hero-sun);
    }

    .clock-card::after { background: var(--hero-moon); }

    .label { color: var(--muted); font-size: 11px; letter-spacing: 0.09em; text-transform: uppercase; font-weight: 700; }
    .weather-main { margin-top: 8px; display: flex; justify-content: space-between; align-items: flex-end; gap: 12px; }
    .temp { font-size: clamp(42px, 6vw, 66px); line-height: 1; font-weight: 900; }
    .condition { margin-top: 6px; font-weight: 700; color: color-mix(in srgb, var(--txt) 83%, var(--blue) 17%); }
    .meta-col { text-align: end; }
    .meta { font-size: 12px; color: var(--muted); margin-top: 5px; }

    .clock-time { margin-top: 6px; font-size: clamp(40px, 5.3vw, 58px); line-height: 1; font-weight: 900; }
    .clock-date { margin-top: 8px; color: var(--muted); font-size: 14px; }
    .ha-state { margin-top: 10px; font-size: 12px; color: var(--muted); }
    .ha-state.good { color: var(--good); }
    .ha-state.warn { color: var(--danger); }

    .systems-strip {
      display: grid;
      grid-template-columns: repeat(8, minmax(105px, 1fr));
      gap: 10px;
    }

    .system-chip {
      position: relative;
      padding: 12px 10px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: linear-gradient(150deg, rgba(255,255,255,0.1), rgba(255,255,255,0.03));
      min-height: 118px;
      cursor: pointer;
      transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
    }

    .system-chip:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.22), 0 0 16px var(--chip-glow);
      border-color: var(--line-strong);
    }

    .system-chip.active {
      background: linear-gradient(150deg, rgba(255,255,255,0.16), rgba(255,255,255,0.03));
      box-shadow: inset 0 0 0 1px var(--line-strong), 0 12px 26px rgba(0,0,0,0.2);
    }

    .system-chip.alert {
      border-color: color-mix(in srgb, var(--danger) 62%, white 0%);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--danger) 52%, white 0%), 0 0 22px color-mix(in srgb, var(--danger) 26%, black 0%);
      animation: pulseAlert 1700ms infinite;
    }

    @keyframes pulseAlert {
      0%,100% { box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--danger) 44%, white 0%), 0 0 10px color-mix(in srgb, var(--danger) 18%, black 0%); }
      50% { box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--danger) 72%, white 0%), 0 0 24px color-mix(in srgb, var(--danger) 38%, black 0%); }
    }

    .icon-wrap {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(155deg, color-mix(in srgb, var(--blue) 36%, transparent), color-mix(in srgb, var(--blue) 12%, transparent));
      border: 1px solid color-mix(in srgb, var(--blue) 44%, white 0%);
      display: grid;
      place-items: center;
      color: color-mix(in srgb, var(--txt) 75%, var(--blue) 25%);
      transition: transform 180ms ease;
    }

    .system-chip:hover .icon-wrap { transform: scale(1.05); }
    .icon-wrap svg { width: 21px; height: 21px; fill: currentColor; }

    .system-title { margin-top: 10px; font-size: 13px; font-weight: 700; letter-spacing: 0.02em; }
    .system-count { margin-top: 4px; font-size: 12px; color: var(--muted); }

    .chip-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      min-width: 26px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 900;
      text-align: center;
      background: linear-gradient(145deg, color-mix(in srgb, var(--blue) 42%, transparent), color-mix(in srgb, var(--blue) 14%, transparent));
      border: 1px solid color-mix(in srgb, var(--blue) 52%, white 0%);
      color: color-mix(in srgb, var(--txt) 80%, var(--blue) 20%);
      box-shadow: 0 3px 10px color-mix(in srgb, var(--blue) 30%, transparent);
    }

    .floors { display: flex; flex-direction: column; gap: 12px; }
    .floor-card { padding: 14px; }

    .floor-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }

    .floor-name { font-size: 19px; font-weight: 800; }
    .floor-meta { font-size: 12px; color: var(--muted); }

    .rooms-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 10px; }

    .room-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.015)), var(--surface-2);
      overflow: hidden;
      transition: border-color 180ms ease, transform 180ms ease;
    }

    .room-card:hover { border-color: var(--line-strong); }

    .room-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
      padding: 11px 12px;
    }

    .room-title { font-weight: 800; }
    .room-stats { color: var(--muted); font-size: 12px; margin-top: 3px; }

    .chev {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: color-mix(in srgb, var(--blue) 18%, transparent);
      color: color-mix(in srgb, var(--txt) 85%, var(--blue) 15%);
      transition: transform 220ms ease;
      font-size: 12px;
      font-weight: 900;
    }

    .room-card.open .chev { transform: rotate(180deg); }

    .room-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 280ms ease, padding 280ms ease;
      padding: 0 12px;
      background: var(--room-open-bg);
    }

    .room-card.open .room-body {
      max-height: 560px;
      padding: 0 12px 12px;
    }

    .entity-list { display: flex; flex-wrap: wrap; gap: 6px; }

    .entity-chip {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid var(--line);
      background: var(--surface-3);
      color: var(--txt);
    }

    .entity-chip.off { opacity: 0.66; }

    .suite {
      border-color: var(--suite-accent);
      background: linear-gradient(145deg, color-mix(in srgb, var(--gold) 18%, transparent), rgba(255,255,255,0.02) 45%), var(--surface-2);
    }

    .suite-subrooms {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .subroom-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      padding: 8px;
    }

    .subroom-title { font-size: 13px; font-weight: 700; margin-bottom: 6px; }

    .empty-state {
      border: 1px dashed var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,0.02);
      color: var(--muted);
      padding: 14px;
      text-align: center;
      font-weight: 600;
    }

    @media (max-width: 1150px) {
      .systems-strip { grid-template-columns: repeat(4, minmax(120px, 1fr)); }
      .hero { grid-template-columns: 1fr; }
    }

    @media (max-width: 780px) {
      .header { grid-template-columns: 1fr; justify-items: center; gap: 8px; }
      .header .left, .header .right { justify-content: center; }
      .villa-title { order: -1; }
      .systems-strip { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      .micro-group { flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>
<body data-family="current" data-mode="night">
  <div class="app">
    <header class="header">
      <div class="micro-group left">
        <div class="seg" id="langSeg">
          <button data-lang="en" class="on">EN</button>
          <button data-lang="ar">عربي</button>
        </div>
      </div>

      <div class="villa-title">ALNAJDI SMART VILA</div>

      <div class="micro-group right">
        <div class="seg" id="familySeg">
          <button data-family="current" class="on">Current</button>
          <button data-family="anashost">Anashost</button>
          <button data-family="glass">Glass</button>
        </div>
        <div class="seg" id="modeSeg">
          <button data-mode="day">Day</button>
          <button data-mode="night" class="on">Night</button>
        </div>
      </div>
    </header>

    <section class="hero">
      <article class="premium-card weather-card">
        <div class="label" id="weatherLabel">Weather</div>
        <div class="weather-main">
          <div>
            <div class="temp" id="weatherTemp">--°</div>
            <div class="condition" id="weatherCondition">--</div>
          </div>
          <div class="meta-col">
            <div class="meta" id="weatherHumidity">Humidity --%</div>
            <div class="meta" id="weatherWind">Wind --</div>
            <div class="meta" id="weatherEntity">Entity --</div>
          </div>
        </div>
      </article>

      <article class="premium-card clock-card">
        <div class="label" id="clockLabel">Local Time</div>
        <div class="clock-time" id="clockTime">00:00</div>
        <div class="clock-date" id="clockDate">--</div>
        <div class="ha-state" id="haStatus">HA: connecting...</div>
      </article>
    </section>

    <section class="systems-strip" id="systemsStrip"></section>

    <section class="floors" id="floorsRoot"></section>
  </div>

<script>
  const I18N = {
    en: {
      weather: 'Weather',
      time: 'Local Time',
      connected: 'HA: connected (live)',
      reconnecting: 'HA: reconnecting...',
      fallback: 'HA: limited data mode',
      devices: 'devices',
      active: 'active',
      noEntities: 'No mapped entities',
      noVisible: 'No floors with detected entities yet',
      humidity: 'Humidity',
      wind: 'Wind',
      entity: 'Entity'
    },
    ar: {
      weather: 'الطقس',
      time: 'الوقت المحلي',
      connected: 'متصل بـ Home Assistant (مباشر)',
      reconnecting: 'إعادة الاتصال بـ Home Assistant...',
      fallback: 'وضع بيانات محدود',
      devices: 'جهاز',
      active: 'نشط',
      noEntities: 'لا توجد كيانات مرتبطة',
      noVisible: 'لا توجد طوابق تحتوي كيانات فعلية حالياً',
      humidity: 'الرطوبة',
      wind: 'الرياح',
      entity: 'الكيان'
    }
  };

  const ICONS = {
    lights: '<svg viewBox="0 0 24 24"><path d="M9 21h6v-1H9v1Zm3-20a7 7 0 0 0-4.39 12.45c.68.55 1.39 1.73 1.39 2.55V17h6v-1c0-.82.71-2 1.39-2.55A7 7 0 0 0 12 1Z"/></svg>',
    climate: '<svg viewBox="0 0 24 24"><path d="M12 2a1 1 0 0 1 1 1v6.13a4 4 0 1 1-2 0V3a1 1 0 0 1 1-1Zm0 10a2 2 0 1 0 2 2 2 2 0 0 0-2-2Z"/></svg>',
    security: '<svg viewBox="0 0 24 24"><path d="M12 2 4 5v6c0 5.55 3.84 10.74 8 12 4.16-1.26 8-6.45 8-12V5l-8-3Zm0 10.5 4-4 1.41 1.41L12 15.33l-2.91-2.92L10.5 11l1.5 1.5Z"/></svg>',
    cameras: '<svg viewBox="0 0 24 24"><path d="M17 10.5V7a2 2 0 0 0-2-2h-3l-1-1H8a2 2 0 0 0-2 2v1H4a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2v-3.5l5 5V5.5l-5 5Zm-7 5A3.5 3.5 0 1 1 13.5 12 3.5 3.5 0 0 1 10 15.5Z"/></svg>',
    media: '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7L8 5Zm-4 2h2v10H4V7Z"/></svg>',
    access: '<svg viewBox="0 0 24 24"><path d="M12 1a5 5 0 0 1 5 5v2h1a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V10a2 2 0 0 1 2-2h1V6a5 5 0 0 1 5-5Zm3 7V6a3 3 0 0 0-6 0v2h6Zm-3 4a2 2 0 0 1 1 3.73V18h-2v-2.27A2 2 0 0 1 12 12Z"/></svg>',
    curtains: '<svg viewBox="0 0 24 24"><path d="M4 3h16a1 1 0 0 1 1 1v16h-2V5h-6v15h-2V5H5v15H3V4a1 1 0 0 1 1-1Z"/></svg>',
    leaks: '<svg viewBox="0 0 24 24"><path d="M12 2s6 6.13 6 10a6 6 0 1 1-12 0C6 8.13 12 2 12 2Zm4.24 10.19-.94-.35A3.49 3.49 0 0 1 12 15.5v1a4.5 4.5 0 0 0 4.24-4.31Z"/></svg>'
  };

  const HOUSE = {
    floors: [
      {
        id: 'ground',
        en: 'Ground Floor',
        ar: 'الدور الأرضي',
        rooms: ['Back Doorway', 'Sitting Room', 'Prep Kitchen', 'Father Room']
      },
      {
        id: 'first',
        en: 'First Floor',
        ar: 'الدور الأول',
        rooms: ['Office', 'Sitting Room', 'Living Room', 'Second Room'],
        suite: {
          en: 'Master Suite',
          ar: 'الجناح الرئيسي',
          rooms: ['Master Bedroom', 'Master Bathroom', 'Master Closet Room']
        }
      },
      {
        id: 'second',
        en: 'Second Floor',
        ar: 'الدور الثاني',
        rooms: ['Second Floor Hall']
      },
      {
        id: 'roof',
        en: 'Roof',
        ar: 'السطح',
        rooms: ['Roof']
      }
    ]
  };

  const ROOM_PROFILE = {
    'Back Doorway': [/back\s?door/i, /doorway/i, /entrance/i],
    'Sitting Room': [/sitting\s?room/i, /majlis/i, /lounge/i],
    'Prep Kitchen': [/prep\s?kitchen/i, /service\s?kitchen/i, /dirty\s?kitchen/i],
    'Father Room': [/father\s?room/i, /dad\s?room/i],
    'Master Bedroom': [/master\s?bedroom/i, /owner\s?bedroom/i],
    'Master Bathroom': [/master\s?bath(room)?/i, /owner\s?bath(room)?/i],
    'Master Closet Room': [/master\s?closet/i, /dressing\s?room/i],
    'Office': [/office/i, /study/i],
    'Living Room': [/living\s?room/i, /family\s?room/i],
    'Second Room': [/second\s?room/i, /bedroom\s?2/i, /guest\s?room/i],
    'Second Floor Hall': [/second\s?floor/i, /upper\s?hall/i],
    'Roof': [/roof/i, /rooftop/i]
  };

  const SYSTEMS = [
    { id: 'lights', label: 'Lighting', predicate: e => domain(e) === 'light' },
    { id: 'climate', label: 'Climate', predicate: e => ['climate', 'fan'].includes(domain(e)) },
    { id: 'security', label: 'Security', predicate: e => ['alarm_control_panel', 'lock'].includes(domain(e)) },
    { id: 'cameras', label: 'Cameras', predicate: e => domain(e) === 'camera' },
    { id: 'media', label: 'Media', predicate: e => domain(e) === 'media_player' },
    { id: 'access', label: 'Doors & Windows', predicate: e => /door|window|gate|lock/i.test(`${e.entity_id} ${friendly(e)}`) },
    { id: 'curtains', label: 'Curtains', predicate: e => domain(e) === 'cover' },
    { id: 'leaks', label: 'Water Safety', predicate: e => /leak|water|moisture|flood/i.test(`${e.entity_id} ${friendly(e)}`) }
  ];

  const STATE = {
    lang: localStorage.getItem('villa_lang') || 'en',
    family: localStorage.getItem('villa_family') || 'current',
    mode: localStorage.getItem('villa_mode') || 'night',
    states: [],
    ws: null,
    wsMsgId: 1,
    connectedVia: 'none',
    wsAuthOk: false
  };

  const q = (sel, parent = document) => parent.querySelector(sel);
  const qa = (sel, parent = document) => [...parent.querySelectorAll(sel)];

  function domain(entity) { return entity.entity_id.split('.')[0] || ''; }
  function friendly(entity) { return entity.attributes?.friendly_name || entity.entity_id; }

  function normalizedSource(entity) {
    const attrs = entity.attributes || {};
    return [
      entity.entity_id,
      attrs.friendly_name,
      attrs.area_id,
      attrs.floor_id,
      attrs.device_class,
      attrs.room,
      attrs.location,
      attrs.zone,
      attrs.assigned_room,
      attrs.level
    ].filter(Boolean).join(' ').toLowerCase();
  }

  function stateIsActive(entity) {
    const offStates = new Set(['off', 'unavailable', 'unknown', 'idle', 'closed', 'disarmed', 'standby', 'not_home']);
    return !offStates.has(String(entity.state || '').toLowerCase());
  }

  function entityIsRenderable(entity) {
    return !!entity?.entity_id && !['zone', 'sun', 'person'].includes(domain(entity));
  }

  function mapRoomEntities(roomName) {
    const profiles = ROOM_PROFILE[roomName] || [new RegExp(roomName, 'i')];
    return STATE.states.filter(entity => {
      if (!entityIsRenderable(entity)) return false;
      const source = normalizedSource(entity);
      return profiles.some(rx => rx.test(source));
    });
  }

  function renderSystemsStrip() {
    const root = q('#systemsStrip');
    root.innerHTML = '';

    SYSTEMS.forEach(system => {
      const matched = STATE.states.filter(e => entityIsRenderable(e) && system.predicate(e));
      const active = matched.filter(stateIsActive);
      const card = document.createElement('article');
      card.className = 'system-chip premium-card';
      if (active.length > 0) card.classList.add('active');
      if (system.id === 'leaks' && active.length > 0) card.classList.add('alert');

      card.innerHTML = `
        <div class="chip-badge">${active.length}</div>
        <div class="icon-wrap">${ICONS[system.id]}</div>
        <div class="system-title">${system.label}</div>
        <div class="system-count">${matched.length} ${I18N[STATE.lang].devices}</div>
      `;

      root.appendChild(card);
    });
  }

  function entityChip(entity) {
    const chip = document.createElement('span');
    chip.className = `entity-chip ${stateIsActive(entity) ? '' : 'off'}`;
    chip.textContent = friendly(entity);
    return chip;
  }

  function buildRoomCard(roomName, entities) {
    const card = document.createElement('article');
    card.className = 'room-card';
    const activeCount = entities.filter(stateIsActive).length;

    card.innerHTML = `
      <div class="room-head">
        <div>
          <div class="room-title">${roomName}</div>
          <div class="room-stats">${activeCount}/${entities.length} ${I18N[STATE.lang].active}</div>
        </div>
        <div class="chev">⌄</div>
      </div>
      <div class="room-body"><div class="entity-list"></div></div>
    `;

    const list = q('.entity-list', card);
    entities.slice(0, 35).forEach(entity => list.appendChild(entityChip(entity)));
    q('.room-head', card).addEventListener('click', () => card.classList.toggle('open'));
    return card;
  }

  function buildMasterSuiteCard(suiteDef) {
    const subrooms = suiteDef.rooms
      .map(room => ({ room, entities: mapRoomEntities(room) }))
      .filter(item => item.entities.length > 0);

    if (!subrooms.length) return null;

    const suiteEntities = subrooms.flatMap(s => s.entities);
    const suiteCard = document.createElement('article');
    suiteCard.className = 'room-card suite';

    suiteCard.innerHTML = `
      <div class="room-head">
        <div>
          <div class="room-title">${STATE.lang === 'ar' ? suiteDef.ar : suiteDef.en}</div>
          <div class="room-stats">${suiteEntities.filter(stateIsActive).length}/${suiteEntities.length} ${I18N[STATE.lang].devices}</div>
        </div>
        <div class="chev">⌄</div>
      </div>
      <div class="room-body"><div class="suite-subrooms"></div></div>
    `;

    const subRoot = q('.suite-subrooms', suiteCard);
    subrooms.forEach(({ room, entities }) => {
      const activeCount = entities.filter(stateIsActive).length;
      const block = document.createElement('section');
      block.className = 'subroom-card';
      block.innerHTML = `
        <div class="subroom-title">${room} · ${activeCount}/${entities.length}</div>
        <div class="entity-list"></div>
      `;
      const list = q('.entity-list', block);
      entities.slice(0, 22).forEach(entity => list.appendChild(entityChip(entity)));
      subRoot.appendChild(block);
    });

    q('.room-head', suiteCard).addEventListener('click', () => suiteCard.classList.toggle('open'));
    return suiteCard;
  }

  function renderFloors() {
    const root = q('#floorsRoot');
    root.innerHTML = '';
    let visibleFloorCount = 0;

    HOUSE.floors.forEach(floor => {
      const roomBlocks = floor.rooms
        .map(roomName => ({ roomName, entities: mapRoomEntities(roomName) }))
        .filter(item => item.entities.length > 0);

      const suiteCard = floor.suite ? buildMasterSuiteCard(floor.suite) : null;
      const floorEntitiesTotal = roomBlocks.reduce((acc, room) => acc + room.entities.length, 0) + (suiteCard ? floor.suite.rooms.flatMap(r => mapRoomEntities(r)).length : 0);

      if (floorEntitiesTotal === 0) return;

      visibleFloorCount += 1;
      const card = document.createElement('section');
      card.className = 'premium-card floor-card';
      const floorName = STATE.lang === 'ar' ? floor.ar : floor.en;
      const grid = document.createElement('div');
      grid.className = 'rooms-grid';

      if (suiteCard) grid.appendChild(suiteCard);
      roomBlocks.forEach(room => grid.appendChild(buildRoomCard(room.roomName, room.entities)));

      card.innerHTML = `
        <div class="floor-head">
          <div class="floor-name">${floorName}</div>
          <div class="floor-meta">${floorEntitiesTotal} ${I18N[STATE.lang].devices}</div>
        </div>
      `;
      card.appendChild(grid);
      root.appendChild(card);
    });

    if (!visibleFloorCount) {
      const empty = document.createElement('div');
      empty.className = 'empty-state premium-card';
      empty.textContent = I18N[STATE.lang].noVisible;
      root.appendChild(empty);
    }
  }

  function updateClock() {
    const now = new Date();
    const locale = STATE.lang === 'ar' ? 'ar-KW' : 'en-US';

    q('#clockTime').textContent = now.toLocaleTimeString(locale, { hour: '2-digit', minute: '2-digit' });
    q('#clockDate').textContent = now.toLocaleDateString(locale, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  }

  function bestWeatherEntity() {
    const weatherEntities = STATE.states.filter(e => domain(e) === 'weather');
    if (weatherEntities.length) {
      return weatherEntities.find(e => e.state !== 'unavailable' && e.state !== 'unknown') || weatherEntities[0];
    }
    const fallbackTemp = STATE.states.find(e => /outside.*temp|temperature.*outside|outdoor.*temp/i.test(e.entity_id + ' ' + friendly(e)));
    if (fallbackTemp) return fallbackTemp;
    return null;
  }

  function bindWeather() {
    const weather = bestWeatherEntity();
    if (!weather) {
      q('#weatherTemp').textContent = '--°';
      q('#weatherCondition').textContent = '--';
      q('#weatherHumidity').textContent = `${I18N[STATE.lang].humidity} --%`;
      q('#weatherWind').textContent = `${I18N[STATE.lang].wind} --`;
      q('#weatherEntity').textContent = `${I18N[STATE.lang].entity} --`;
      return;
    }

    const attrs = weather.attributes || {};
    const t = Number(attrs.temperature);
    const h = attrs.humidity;
    const wind = attrs.wind_speed ?? attrs.wind_bearing ?? attrs.wind_speed_unit ?? '--';

    q('#weatherTemp').textContent = Number.isFinite(t) ? `${Math.round(t)}°` : `${Number(weather.state) || '--'}°`;
    q('#weatherCondition').textContent = attrs.friendly_name || weather.state || '--';
    q('#weatherHumidity').textContent = `${I18N[STATE.lang].humidity} ${h ?? '--'}%`;
    q('#weatherWind').textContent = `${I18N[STATE.lang].wind} ${wind}`;
    q('#weatherEntity').textContent = `${I18N[STATE.lang].entity} ${weather.entity_id}`;
  }

  function setHaStatus(key, className = '') {
    const el = q('#haStatus');
    el.textContent = I18N[STATE.lang][key];
    el.className = `ha-state ${className}`.trim();
  }

  function renderAll() {
    bindWeather();
    renderSystemsStrip();
    renderFloors();
  }

  function applyLanguage() {
    document.documentElement.lang = STATE.lang;
    document.documentElement.dir = STATE.lang === 'ar' ? 'rtl' : 'ltr';
    document.body.classList.toggle('rtl', STATE.lang === 'ar');

    q('#weatherLabel').textContent = I18N[STATE.lang].weather;
    q('#clockLabel').textContent = I18N[STATE.lang].time;
    qa('#langSeg button').forEach(button => button.classList.toggle('on', button.dataset.lang === STATE.lang));

    updateClock();
    renderAll();
  }

  function applyTheme() {
    document.body.dataset.family = STATE.family;
    document.body.dataset.mode = STATE.mode;

    qa('#familySeg button').forEach(b => b.classList.toggle('on', b.dataset.family === STATE.family));
    qa('#modeSeg button').forEach(b => b.classList.toggle('on', b.dataset.mode === STATE.mode));
  }

  function snapshotFromHassObject(hass) {
    const list = Object.values(hass.states || {}).filter(Boolean);
    if (!list.length) return false;
    STATE.states = list;
    STATE.connectedVia = 'hass';
    setHaStatus('connected', 'good');
    renderAll();
    return true;
  }

  function tryConnectViaWindowHass() {
    const candidates = [window.hass, window.parent?.hass, document.querySelector('home-assistant')?.hass].filter(Boolean);
    for (const hass of candidates) {
      if (snapshotFromHassObject(hass)) return true;
    }
    return false;
  }

  function getStoredAccessToken() {
    try {
      const raw = localStorage.getItem('hassTokens');
      if (!raw) return '';
      const parsed = JSON.parse(raw);
      return parsed?.access_token || '';
    } catch {
      return '';
    }
  }

  async function loadStatesViaRest() {
    const token = getStoredAccessToken();
    const headers = token ? { Authorization: `Bearer ${token}` } : {};
    const res = await fetch('/api/states', { credentials: 'same-origin', cache: 'no-store', headers });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const payload = await res.json();
    if (!Array.isArray(payload)) throw new Error('Invalid payload');
    STATE.states = payload;
    STATE.connectedVia = 'rest';
    setHaStatus('fallback');
    renderAll();
  }

  function openWs() {
    const token = getStoredAccessToken();
    if (!token) return false;

    try {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const socket = new WebSocket(`${proto}//${location.host}/api/websocket`);
      STATE.ws = socket;
      setHaStatus('reconnecting');

      socket.onmessage = event => {
        let msg;
        try { msg = JSON.parse(event.data); } catch { return; }

        if (msg.type === 'auth_required') {
          socket.send(JSON.stringify({ type: 'auth', access_token: token }));
        } else if (msg.type === 'auth_ok') {
          STATE.wsAuthOk = true;
          socket.send(JSON.stringify({ id: STATE.wsMsgId++, type: 'get_states' }));
          socket.send(JSON.stringify({ id: STATE.wsMsgId++, type: 'subscribe_events', event_type: 'state_changed' }));
          setHaStatus('connected', 'good');
        } else if (msg.type === 'result' && Array.isArray(msg.result)) {
          STATE.states = msg.result;
          renderAll();
        } else if (msg.type === 'event' && msg.event?.event_type === 'state_changed') {
          const changed = msg.event.data?.new_state;
          if (!changed?.entity_id) return;
          const ix = STATE.states.findIndex(s => s.entity_id === changed.entity_id);
          if (ix >= 0) STATE.states[ix] = changed;
          else STATE.states.push(changed);
          renderAll();
        }
      };

      socket.onclose = () => {
        STATE.ws = null;
        STATE.wsAuthOk = false;
        setHaStatus('reconnecting');
      };
      return true;
    } catch {
      return false;
    }
  }

  async function refreshHA() {
    if (tryConnectViaWindowHass()) return;

    if (!STATE.ws && openWs()) return;

    try {
      await loadStatesViaRest();
    } catch {
      STATE.states = [];
      setHaStatus('fallback', 'warn');
      renderAll();
    }
  }

  qa('#familySeg button').forEach(button => {
    button.addEventListener('click', () => {
      STATE.family = button.dataset.family;
      localStorage.setItem('villa_family', STATE.family);
      applyTheme();
    });
  });

  qa('#modeSeg button').forEach(button => {
    button.addEventListener('click', () => {
      STATE.mode = button.dataset.mode;
      localStorage.setItem('villa_mode', STATE.mode);
      applyTheme();
    });
  });

  qa('#langSeg button').forEach(button => {
    button.addEventListener('click', () => {
      STATE.lang = button.dataset.lang;
      localStorage.setItem('villa_lang', STATE.lang);
      applyLanguage();
    });
  });

  applyTheme();
  updateClock();
  setInterval(updateClock, 1000);
  applyLanguage();
  refreshHA();
  setInterval(refreshHA, 30000);
</script>
</body>
</html>
